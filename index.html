<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Rail Sim - Final Perfection</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; background: #1a1a1a; }
        #ui { position: absolute; top: 10px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; z-index: 10; width: 250px; max-height: 95vh; overflow-y: auto; padding-right: 5px; }
        #ui::-webkit-scrollbar { width: 6px; } #ui::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        button { padding: 8px; font-size: 11px; cursor: pointer; border: none; border-radius: 6px; background: #2196F3; color: white; font-weight: bold; width: 100%; transition: opacity 0.2s; box-sizing: border-box; }
        button:active { opacity: 0.7; }
        .inst { position: absolute; bottom: 10px; left: 10px; color: #ccc; font-size: 12px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; line-height: 1.4;}
        #status { color: #ff5252; font-weight: bold; margin-top: 5px; min-height: 1.2em; text-shadow: 1px 1px 2px black; font-size: 12px; width: 100%; }
        .flex-row { display: flex; gap: 5px; width: 100%; }
        .flex-row button { flex: 1; padding: 8px 2px; }
        .divider { width: 100%; height: 1px; background: #444; margin: 3px 0; }
        .category-label { color: #ccc; font-size: 11px; width: 100%; margin-bottom: -2px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="category-label">▼ 基本レール群</div>
        <button onclick="addRail('straight')">直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_length_straight')">2倍直線</button>
            <button onclick="addRail('half_straight')" style="background:#42A5F5;">1/2直線</button>
            <button onclick="addRail('quarter_straight')" style="background:#64B5F6; color:#000;">1/4直線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('curve')">曲線</button>
            <button onclick="addRail('double_length_curve')">2倍曲線(90°)</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('s_curve')" style="background:#1E88E5;">S字カーブ</button>
            <button onclick="addRail('turnout')" style="background:#00BCD4;">ターンアウト</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('fig8')" style="background:#00ACC1;">8の字</button>
            <button onclick="addRail('y_point')" style="background:#0097A7;">Y字分岐</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('3way_A')" style="background:#8e24aa;">3分岐レール</button>
        </div>

        <div class="divider"></div>
        <div class="category-label">▼ 坂・高架レール群</div>
        <button onclick="addRail('slope')" style="background:#ffb300; color:#000;">直線坂</button>
        <div class="flex-row">
            <button onclick="addRail('slope_curve_A')" style="background:#FF9800; color:#000;">坂曲線A (下凹/左上)</button>
            <button onclick="addRail('slope_curve_B')" style="background:#FF9800; color:#000;">坂曲線B (下凸/右上)</button>
        </div>
        
        <div class="divider"></div>
        <div class="category-label">▼ 複線レール群</div>
        <button onclick="addRail('double_straight')">複線 直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_curve')">複線 曲線</button>
            <button onclick="addRail('outer_curve')">複外 曲線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('double_point')" style="background:#00897B;">単線・複線ポイント</button>
            <button onclick="addRail('double_turnout')" style="background:#00ACC1;">複線分岐</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('double_crossover')" style="background:#00695C;">渡りポイント</button>
        </div>

        <div class="divider"></div>
        <div class="category-label">▼ 操作・編集</div>
        <div class="flex-row">
            <button onclick="changeHeight(1)" style="background:#00BCD4;">1 ⬆️</button>
            <button onclick="changeHeight(0.25)" style="background:#26C6DA;">1/4 ⤴️</button>
            <button onclick="changeHeight(-0.25)" style="background:#4DD0E1;">1/4 ⤵️</button>
            <button onclick="changeHeight(-1)" style="background:#0097A7;">1 ⬇️</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(1)" style="background:#4CAF50;">↺ 左45°</button>
            <button onclick="rotate(-1)" style="background:#4CAF50;">右45° ↻</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(2)" style="background:#43A047;">↺ 左90°</button>
            <button onclick="rotate(4)" style="background:#388E3C;">180°反転</button>
            <button onclick="rotate(-2)" style="background:#43A047;">右90° ↻</button>
        </div>

        <button onclick="flipCurve()" style="background:#9C27B0;">レール裏返し (左右反転) ⇄</button>
        <button onclick="flipGender()" style="background:#E91E63;">ジョイント(凸凹)入替</button>
         
        <div class="flex-row">
            <button onclick="toggleAutoAlign()" id="autoAlignBtn" style="background:#FF9800;">自動回転: ON</button>
            <button onclick="deleteRail()" style="background:#f44336;">選択削除</button>
        </div>
        
        <div class="divider"></div>

        <div class="flex-row">
            <button onclick="saveToBrowser()" style="background:#607D8B;">💾 保存</button>
            <button onclick="loadFromBrowser()" style="background:#607D8B;">📂 読込</button>
        </div>
        <div class="flex-row">
            <button onclick="exportJSON()" style="background:#795548;">📤 書出</button>
            <button onclick="document.getElementById('fileInput').click()" style="background:#795548;">📥 読込</button>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importJSON(event)">

        <div id="status"></div>
    </div>
    
    <div class="inst">
        ◆ L/Rや上り下りボタンは統合されています。「反転」を使うと最後に使った向きを記憶します。<br>
        ◆ すべてのジョイントの凹凸が合わないとスナップしません。<br>
        ◆ 視点移動: 右クリック(2本指)ドラッグ
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, orbit;
        const rails = [];
        let selectedObject = null;
        let autoAlignEnabled = true;
        
        const L = 10; 
        const W = 1.8;
        const SNAP_DIST = 2.5; 
        const OFFSET = 2.8;
        const H_UNIT = 3.0; 

        const matNormal = new THREE.MeshPhongMaterial({ color: 0x0072bc });
        const matYellow = new THREE.MeshPhongMaterial({ color: 0xffd600 });
        const edgeMatNormal = new THREE.LineBasicMaterial({ color: 0x001133 });

        const p0 = [0, 0, 0, 0, 0, -1];
        const pS = [0, 0, L, 0, 0, 1];
        
        const pCL = [L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pCR = [-L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pOCL = [(L+OFFSET) * (1 - Math.cos(Math.PI/4)), 0, (L+OFFSET) * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pOCR = [-(L+OFFSET) * (1 - Math.cos(Math.PI/4)), 0, (L+OFFSET) * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        
        const railPrefs = {
            'curve': 'curve_right', 'double_length_curve': 'double_length_curve_right',
            's_curve': 's_curve_L', 'turnout': 'turnout_L_out',
            'fig8': 'fig8_F_RM', 'y_point': 'y_point_F_RM', '3way': '3way_A',
            'slope': 'slope_up', 'double_curve': 'double_curve_right',
            'outer_curve': 'outer_curve_right', 'double_turnout': 'double_turnout_L',
            'double_crossover': 'double_crossover_L', 'double_point': 'double_point_L_out'
        };

        let pierGroup;
        let pierGeo, pierEdges, pierEdgeMat;
        let miniPierGeo, miniPierEdges;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(20, 40, 30);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(200, 40, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            pierGroup = new THREE.Group();
            scene.add(pierGroup);

            const pierShape = new THREE.Shape();
            const pw = 1.7, ph = H_UNIT, th = 0.4, topTh = 0.5; 
            pierShape.moveTo(-pw, 0); pierShape.lineTo(-pw, ph); pierShape.lineTo(pw, ph);
            pierShape.lineTo(pw, 0);
            pierShape.lineTo(pw - th, 0); pierShape.lineTo(pw - th, ph - topTh); pierShape.lineTo(-pw + th, ph - topTh);
            pierShape.lineTo(-pw + th, 0);
            pierShape.closePath();
            pierGeo = new THREE.ExtrudeGeometry(pierShape, { depth: 1.8, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 });
            pierGeo.translate(0, 0, -0.9);
            pierEdges = new THREE.EdgesGeometry(pierGeo, 15);
            pierEdgeMat = new THREE.LineBasicMaterial({ color: 0xb89a00 });

            const miniPierShape = new THREE.Shape();
            const mph = H_UNIT / 4;
            miniPierShape.moveTo(-pw, 0); miniPierShape.lineTo(-pw, mph); miniPierShape.lineTo(pw, mph); miniPierShape.lineTo(pw, 0);
            miniPierShape.closePath();
            miniPierGeo = new THREE.ExtrudeGeometry(miniPierShape, { depth: 1.8, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 });
            miniPierGeo.translate(0, 0, -0.9);
            miniPierEdges = new THREE.EdgesGeometry(miniPierGeo, 15);

            orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true; 
            setupCustomDrag();
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function showMessage(msg) {
            const status = document.getElementById('status');
            status.innerText = msg;
            setTimeout(() => { if (status.innerText === msg) status.innerText = ''; }, 3000);
        }

        function setupCustomDrag() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let draggingRail = null;
            let dragOffset = new THREE.Vector3();
            const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            renderer.domElement.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const validHits = raycaster.intersectObjects(rails, true).filter(h => h.object.type === 'Mesh' && !h.object.userData.ignoreRaycast);
            
                if (validHits.length > 0) {
                    let obj = validHits[0].object;
                    while (obj && !rails.includes(obj)) obj = obj.parent;
                    if (obj) {
                        orbit.enabled = false; selectedObject = obj; draggingRail = obj; highlight(obj);
                        const planeY = obj.position.y;
                        dragPlane.constant = -planeY;
                        obj.userData.baseY = planeY;
                        obj.userData.baseRotation = obj.rotation.y; 
                        
                        const hitPt = new THREE.Vector3();
                        if (raycaster.ray.intersectPlane(dragPlane, hitPt)) dragOffset.copy(hitPt).sub(obj.position);
                        renderer.domElement.setPointerCapture(e.pointerId);
                    }
                } else { selectedObject = null; highlight(null); }
            });

            renderer.domElement.addEventListener('pointermove', (e) => {
                if (draggingRail) {
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const hitPt = new THREE.Vector3();
                    if (raycaster.ray.intersectPlane(dragPlane, hitPt)) {
                        const oldRot = draggingRail.rotation.y;
                        draggingRail.position.copy(hitPt).sub(dragOffset); 
                        draggingRail.position.y = draggingRail.userData.baseY; 
                        
                        const snapped = checkSnap(draggingRail, false);
                        
                        if (!snapped && draggingRail.rotation.y !== oldRot) {
                            const diff = draggingRail.rotation.y - oldRot;
                            dragOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), diff);
                            draggingRail.position.copy(hitPt).sub(dragOffset);
                            draggingRail.position.y = draggingRail.userData.baseY;
                            draggingRail.updateMatrixWorld();
                        }
                    }
                }
            });

            renderer.domElement.addEventListener('pointerup', (e) => { 
                if (draggingRail) { renderer.domElement.releasePointerCapture(e.pointerId); updatePiers(); }
                draggingRail = null; orbit.enabled = true; 
            });
        }

        window.toggleAutoAlign = () => {
            autoAlignEnabled = !autoAlignEnabled;
            const btn = document.getElementById('autoAlignBtn');
            btn.innerText = `自動回転: ${autoAlignEnabled ? 'ON' : 'OFF'}`;
            btn.style.background = autoAlignEnabled ? '#FF9800' : '#757575';
        };

        window.changeHeight = (delta) => {
            if (!selectedObject) return showMessage("レールを選択してください。");
            if (isConnected(selectedObject)) return showMessage("接続中は高さを変更できません。");
            
            selectedObject.position.y += delta * H_UNIT;
            if (selectedObject.position.y < 0) selectedObject.position.y = 0;
            
            selectedObject.userData.baseY = selectedObject.position.y;
            checkSnap(selectedObject, true); 
            updatePiers();
        };

        function updatePiers() {
            pierGroup.clear();
            const spots = [];

            rails.forEach(rail => {
                const joints = getJointData(rail);
                joints.forEach(j => {
                    const qLevel = Math.round(j.pos.y / (H_UNIT / 4));
                    if (qLevel > 0) {
                        let found = spots.find(s => Math.hypot(s.x - j.pos.x, s.z - j.pos.z) < 0.5);
                        if (found) {
                            found.maxY = Math.max(found.maxY, j.pos.y);
                            if (j.isSlopeTop) found.hasSlopeTop = true;
                        } else {
                            let rotY = Math.atan2(j.dir.x, j.dir.z); 
                            spots.push({ x: j.pos.x, z: j.pos.z, maxY: j.pos.y, rotY, hasSlopeTop: j.isSlopeTop });
                        }
                    }
                });
            });

            spots.forEach(spot => {
                let maxLevel = Math.round(spot.maxY / (H_UNIT / 4));
                if (spot.hasSlopeTop) maxLevel -= 1;
                if (maxLevel <= 0) return;

                const numQuarter = maxLevel % 4; 
                const numFull = Math.floor(maxLevel / 4); 
                let currentY = 0;
                
                for (let i = 0; i < numQuarter; i++) {
                    const mesh = new THREE.Mesh(miniPierGeo, matYellow);
                    mesh.position.set(spot.x, currentY, spot.z);
                    mesh.rotation.y = spot.rotY;
                    const edges = new THREE.LineSegments(miniPierEdges, pierEdgeMat);
                    mesh.add(edges);
                    pierGroup.add(mesh);
                    currentY += (H_UNIT / 4);
                }
                
                for (let i = 0; i < numFull; i++) {
                    const mesh = new THREE.Mesh(pierGeo, matYellow);
                    mesh.position.set(spot.x, currentY, spot.z);
                    mesh.rotation.y = spot.rotY;
                    const edges = new THREE.LineSegments(pierEdges, pierEdgeMat);
                    mesh.add(edges);
                    pierGroup.add(mesh);
                    currentY += H_UNIT;
                }
            });
        }

        function getJointData(rail) {
            rail.updateMatrixWorld();
            const joints = [], m = rail.matrixWorld, q = rail.quaternion, type = rail.userData.type;
            const addJoint = (id, x, y, z, dx, dy, dz, gender, isSlopeTop = false) => {
                joints.push({ id, pos: new THREE.Vector3(x, y, z).applyMatrix4(m), dir: new THREE.Vector3(dx, dy, dz).applyQuaternion(q).normalize(), gender, isSlopeTop });
            };
            const H_Q = H_UNIT / 4;

            if (type === 'straight') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); }
            else if (type === 'double_length_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, 2*L, 0, 0, 1, 'M'); }
            else if (type === 'half_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/2, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight_MM') { addJoint(0, ...p0, 'M'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight_FF') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'F'); }
            
            else if (type === 'double_length_curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, L, 0, L, 1, 0, 0, 'M'); }
            else if (type === 'double_length_curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, -L, 0, L, -1, 0, 0, 'M'); }

            else if (type === 's_curve_L') { addJoint(0, ...p0, 'F'); addJoint(1, OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 's_curve_R') { addJoint(0, ...p0, 'F'); addJoint(1, -OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 's_curve_L_flip') { addJoint(0, ...p0, 'M'); addJoint(1, OFFSET, 0, L, 0, 0, 1, 'F'); }
            else if (type === 's_curve_R_flip') { addJoint(0, ...p0, 'M'); addJoint(1, -OFFSET, 0, L, 0, 0, 1, 'F'); }

            else if (type === 'slope_up') { addJoint(0, 0,0,0, 0,0,-1, 'M'); addJoint(1, 0,H_UNIT,2*L, 0,0,1, 'F'); }
            else if (type === 'slope_down') { addJoint(0, 0,H_UNIT,0, 0,0,-1, 'M'); addJoint(1, 0,0,2*L, 0,0,1, 'F'); }
            else if (type === 'slope_up_flip') { addJoint(0, 0,0,0, 0,0,-1, 'F'); addJoint(1, 0,H_UNIT,2*L, 0,0,1, 'M'); }
            else if (type === 'slope_down_flip') { addJoint(0, 0,H_UNIT,0, 0,0,-1, 'F'); addJoint(1, 0,0,2*L, 0,0,1, 'M'); }

            else if (type === 'slope_curve_A') { addJoint(0, ...p0, 'F'); addJoint(1, pCL[0], H_Q, pCL[2], pCL[3], pCL[4], pCL[5], 'M', true); }
            else if (type === 'slope_curve_B') { addJoint(0, ...p0, 'M'); addJoint(1, pCR[0], H_Q, pCR[2], pCR[3], pCR[4], pCR[5], 'F', true); }

            else if (type === 'curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCL, 'M'); }
            else if (type === 'curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'M'); }
            else if (type === 'outer_curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, ...pOCL, 'M'); }
            else if (type === 'outer_curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, ...pOCR, 'M'); }
            
            else if (type === '3way_A') { addJoint(0, ...p0, 'M'); addJoint(1, ...pS, 'F'); addJoint(2, ...pCL, 'M'); addJoint(3, ...pCR, 'F'); }
            else if (type === '3way_B') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'F'); addJoint(3, ...pCR, 'M'); }
            else if (type === '3way_A_flip') { addJoint(0, ...p0, 'M'); addJoint(1, ...pS, 'F'); addJoint(2, ...pCL, 'F'); addJoint(3, ...pCR, 'M'); }
            else if (type === '3way_B_flip') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'M'); addJoint(3, ...pCR, 'F'); }
            
            else if (type === 'double_straight' || type.startsWith('double_crossover_')) {
                addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
            }
            else if (type === 'double_curve_left') {
                addJoint(0, ...p0, 'F'); addJoint(1, ...pCL, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, L - (L+OFFSET)*Math.cos(Math.PI/4), 0, (L+OFFSET)*Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            // ▼ ここが修正ポイント：複線曲線（右）
            else if (type === 'double_curve_right') {
                addJoint(0, ...p0, 'F');
                addJoint(1, ...pOCR, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, -(L+OFFSET) + L*Math.cos(Math.PI/4), 0, L*Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            // ▼ ここが修正ポイント：複線ターンアウト（右）
            else if (type === 'double_turnout_L') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'F'); addJoint(1, 0, 0, L, 0, 0, 1, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
                addJoint(4, L, 0, L, 1, 0, 0, 'M'); addJoint(5, L, 0, L+OFFSET, 1, 0, 0, 'M');
            }
            else if (type === 'double_turnout_R') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'F');
                addJoint(1, 0, 0, L, 0, 0, 1, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
                addJoint(4, -(L+OFFSET), 0, L+OFFSET, -1, 0, 0, 'M');
                addJoint(5, -(L+OFFSET), 0, L, -1, 0, 0, 'M');
            }
            else if (type === 'double_turnout_L_flip') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'M'); addJoint(1, 0, 0, L, 0, 0, 1, 'F');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'M'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'F');
                addJoint(4, L, 0, L, 1, 0, 0, 'F'); addJoint(5, L, 0, L+OFFSET, 1, 0, 0, 'F');
            }
            else if (type === 'double_turnout_R_flip') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'M');
                addJoint(1, 0, 0, L, 0, 0, 1, 'F');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'M');
                addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'F');
                addJoint(4, -(L+OFFSET), 0, L+OFFSET, -1, 0, 0, 'F');
                addJoint(5, -(L+OFFSET), 0, L, -1, 0, 0, 'F');
            }
            else if (type === 'turnout_L_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'turnout_R_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCR, 'M'); }
            else if (type === 'turnout_L_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'turnout_R_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, ...pCR, 'F'); }
            
            return joints;
        }

        function checkSnap(dragged, skipAutoAlign) {
            let myJoints = getJointData(dragged);
            const occupied = [];
            rails.forEach(r => { if (r !== dragged) getJointData(r).forEach(j => occupied.push({ rail: r, pos: j.pos, dir: j.dir, gender: j.gender })); });
            const type = dragged.userData.type;
            const isBranch = type.includes('turnout') || type.includes('point') || type.includes('fig8') || type.includes('3way') || type.startsWith('double_crossover_');
            
            if (autoAlignEnabled && !isBranch && !skipAutoAlign) {
                let aligned = false;
                for (let mj of myJoints) {
                    for (let occ of occupied) {
                        if (mj.pos.distanceTo(occ.pos) < SNAP_DIST * 1.1 && mj.gender !== occ.gender) {
                            const overlapping = occupied.filter(o => occ.pos.distanceTo(o.pos) < 0.1);
                            if (overlapping.length >= 2) continue;
                            const targetAngle = Math.atan2(-occ.dir.x, -occ.dir.z);
                            const currentAngle = Math.atan2(mj.dir.x, mj.dir.z);
                            let diff = targetAngle - currentAngle;
                            diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                            dragged.rotation.y += diff;
                            dragged.updateMatrixWorld();
                            myJoints = getJointData(dragged);
                            aligned = true;
                            break;
                        }
                    }
                    if (aligned) break;
                }
                if (!aligned && dragged.userData.baseRotation !== undefined) {
                    dragged.rotation.y = dragged.userData.baseRotation;
                    dragged.updateMatrixWorld();
                    myJoints = getJointData(dragged);
                }
            }
            
            for (let mj of myJoints) {
                for (let occ of occupied) {
                    if (mj.pos.distanceTo(occ.pos) < SNAP_DIST && mj.dir.dot(occ.dir) < -0.9 && mj.gender !== occ.gender) {
                        const overlapping = occupied.filter(o => occ.pos.distanceTo(o.pos) < 0.1);
                        if (overlapping.length >= 2) continue;
                        dragged.position.add(occ.pos).sub(mj.pos);
                        dragged.updateMatrixWorld();
                        return true;
                    }
                }
            }
            return false;
        }

        function createRailObject(type) {
            const rail = new THREE.Group();
            rail.userData = { type };
            const mat = matNormal;

            const addEdges = (mesh, geo) => { const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo, 15), edgeMatNormal); mesh.add(edges); };

            let geometry;

            if (type === 'slope_up' || type === 'slope_down' || type === 'slope_up_flip' || type === 'slope_down_flip') {
                const isUp = type === 'slope_up' || type === 'slope_up_flip';
                geometry = new THREE.BoxGeometry(W, 0.4, 2*L, 1, 1, 32);
                geometry.translate(0, 0.2, L);
                const pos = geometry.attributes.position;
                for(let i=0; i<pos.count; i++) {
                    const z = pos.getZ(i);
                    let t = z / (2*L);
                    let smoothT = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    if (!isUp) smoothT = 1 - smoothT;
                    pos.setY(i, pos.getY(i) + smoothT * H_UNIT);
                }
                geometry.computeVertexNormals();
            } else if (type === 'slope_curve_A' || type === 'slope_curve_B') {
                const isB = type === 'slope_curve_B';
                const shape = new THREE.Shape();
                if (isB) {
                    shape.absarc(-L, 0, L + W/2, 0, Math.PI/4, false);
                    shape.absarc(-L, 0, L - W/2, Math.PI/4, 0, true);
                } else {
                    shape.absarc(L, 0, L + W/2, Math.PI, Math.PI - Math.PI/4, true);
                    shape.absarc(L, 0, L - W/2, Math.PI - Math.PI/4, Math.PI, false);
                }
                geometry = new THREE.ExtrudeGeometry(shape, { depth: 0.4, bevelEnabled: false, curveSegments: 16 });
                geometry.rotateX(Math.PI / 2); geometry.translate(0, 0.4, 0);
                const pos = geometry.attributes.position;
                const cx = isB ? -L : L;
                const startAngle = isB ? 0 : Math.PI;
                const endAngle = isB ? Math.PI/4 : Math.PI - Math.PI/4;
                const angleRange = endAngle - startAngle;
                for(let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i); const z = pos.getZ(i);
                    let angle = Math.atan2(z, x - cx);
                    if (angle < 0) angle += Math.PI * 2;
                    let t = (angle - startAngle) / angleRange;
                    if (!isB) t = 1 - t;
                    let smoothT = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                    pos.setY(i, pos.getY(i) + smoothT * (H_UNIT / 4));
                }
                geometry.computeVertexNormals();
            } else if (type === 'straight' || type === 'double_length_straight' || type === 'half_straight' || type.startsWith('quarter_straight') || type === 'double_straight' || type.startsWith('double_crossover_')) {
                let len = L;
                if (type === 'double_length_straight') len = L * 2;
                else if (type === 'half_straight') len = L / 2;
                else if (type.startsWith('quarter_straight')) len = L / 4;
                geometry = new THREE.BoxGeometry(W, 0.4, len);
                geometry.translate(0, 0.2, len/2);
            } else if (!type.startsWith('fig8_') && !type.startsWith('y_point_') && !type.startsWith('3way_') && !type.startsWith('double_turnout_') && !type.startsWith('turnout_') && !type.startsWith('double_point_')) {
                const shape = new THREE.Shape();
                if (type === 'curve_right' || type === 'double_curve_right') {
                    shape.absarc(-L, 0, L + W/2, 0, Math.PI/4, false);
                    shape.absarc(-L, 0, L - W/2, Math.PI/4, 0, true);
                } else if (type === 'curve_left' || type === 'double_curve_left') {
                    shape.absarc(L, 0, L + W/2, Math.PI, Math.PI - Math.PI/4, true);
                    shape.absarc(L, 0, L - W/2, Math.PI - Math.PI/4, Math.PI, false);
                } else if (type === 'double_length_curve_left') {
                    shape.absarc(L, 0, L + W/2, Math.PI, Math.PI - Math.PI/2, true);
                    shape.absarc(L, 0, L - W/2, Math.PI - Math.PI/2, Math.PI, false);
                } else if (type === 'double_length_curve_right') {
                    shape.absarc(-L, 0, L + W/2, 0, Math.PI/2, false);
                    shape.absarc(-L, 0, L - W/2, Math.PI/2, 0, true);
                } else if (type === 's_curve_L' || type === 's_curve_L_flip') {
                    shape.moveTo(-W/2, 0); shape.lineTo(W/2, 0); shape.lineTo(W/2 + OFFSET, L); shape.lineTo(-W/2 + OFFSET, L);
                } else if (type === 's_curve_R' || type === 's_curve_R_flip') {
                    shape.moveTo(-W/2, 0); shape.lineTo(W/2, 0); shape.lineTo(W/2 - OFFSET, L); shape.lineTo(-W/2 - OFFSET, L);
                } else if (type === 'outer_curve_left') {
                    shape.absarc(L+OFFSET, 0, L+OFFSET + W/2, Math.PI, Math.PI - Math.PI/4, true);
                    shape.absarc(L+OFFSET, 0, L+OFFSET - W/2, Math.PI - Math.PI/4, Math.PI, false);
                } else if (type === 'outer_curve_right') {
                    shape.absarc(-(L+OFFSET), 0, L+OFFSET + W/2, 0, Math.PI/4, false);
                    shape.absarc(-(L+OFFSET), 0, L+OFFSET - W/2, Math.PI/4, 0, true);
                }
                geometry = new THREE.ExtrudeGeometry(shape, { depth: 0.4, bevelEnabled: false, curveSegments: 16 });
                geometry.rotateX(Math.PI/2); geometry.translate(0, 0.4, 0);
            }

            if (geometry) {
                const mesh = new THREE.Mesh(geometry, mat);
                addEdges(mesh, geometry);
                rail.add(mesh);
            }

            const addBridge = (x, y, z, rotY) => {
                const bGeo = new THREE.BoxGeometry(OFFSET, 0.2, 0.8);
                const bridge = new THREE.Mesh(bGeo, mat);
                bridge.position.set(x, y, z);
                bridge.rotation.y = rotY;
                addEdges(bridge, bGeo);
                rail.add(bridge);
            };

            // 複線や分岐等の個別処理
            if (type === 'double_straight' || type.startsWith('double_crossover_')) {
                const geo2 = new THREE.BoxGeometry(W, 0.4, L);
                geo2.translate(-OFFSET, 0.2, L/2);
                const mesh2 = new THREE.Mesh(geo2, mat); addEdges(mesh2, geo2); rail.add(mesh2);
                addBridge(-OFFSET/2, 0.1, L/4, 0); addBridge(-OFFSET/2, 0.1, 3*L/4, 0);
            } else if (type === 'double_curve_left') {
                const shape2 = new THREE.Shape();
                shape2.absarc(L, 0, L-OFFSET + W/2, Math.PI, Math.PI - Math.PI/4, true);
                shape2.absarc(L, 0, L-OFFSET - W/2, Math.PI - Math.PI/4, Math.PI, false);
                const cGeo2 = new THREE.ExtrudeGeometry(shape2, { depth: 0.4, bevelEnabled: false, curveSegments: 16 });
                cGeo2.rotateX(Math.PI/2); cGeo2.translate(0, 0.4, 0);
                const cMesh2 = new THREE.Mesh(cGeo2, mat); addEdges(cMesh2, cGeo2); rail.add(cMesh2);
                
                const R = L - OFFSET/2, a1 = Math.PI - Math.PI/12, a2 = Math.PI - Math.PI/6;
                addBridge(L + R*Math.cos(a1), 0.1, R*Math.sin(a1), -a1);
                addBridge(L + R*Math.cos(a2), 0.1, R*Math.sin(a2), -a2);
            }
            // ▼ ここが修正ポイント：複線曲線（右）の生成
            else if (type === 'double_curve_right') {
                const shape = new THREE.Shape();
                shape.absarc(-(L+OFFSET), 0, L+OFFSET + W/2, 0, Math.PI/4, false);
                shape.absarc(-(L+OFFSET), 0, L+OFFSET - W/2, Math.PI/4, 0, true);
                const cGeo = new THREE.ExtrudeGeometry(shape, { depth: 0.4, bevelEnabled: false, curveSegments: 16 });
                cGeo.rotateX(Math.PI/2); cGeo.translate(0, 0.4, 0);
                const cMesh = new THREE.Mesh(cGeo, mat); addEdges(cMesh, cGeo); rail.add(cMesh);

                const shape2 = new THREE.Shape();
                shape2.absarc(-(L+OFFSET), 0, L + W/2, 0, Math.PI/4, false);
                shape2.absarc(-(L+OFFSET), 0, L - W/2, Math.PI/4, 0, true);
                const cGeo2 = new THREE.ExtrudeGeometry(shape2, { depth: 0.4, bevelEnabled: false, curveSegments: 16 });
                cGeo2.rotateX(Math.PI/2); cGeo2.translate(0, 0.4, 0);
                const cMesh2 = new THREE.Mesh(cGeo2, mat); addEdges(cMesh2, cGeo2); rail.add(cMesh2);

                const R = L + OFFSET/2, a1 = Math.PI/12, a2 = Math.PI/6;
                addBridge(-(L+OFFSET) + R*Math.cos(a1), 0.1, R*Math.sin(a1), -a1);
                addBridge(-(L+OFFSET) + R*Math.cos(a2), 0.1, R*Math.sin(a2), -a2);
            }
            else if (type === 'double_turnout_L' || type === 'double_turnout_L_flip') {
                const geoS1 = new THREE.BoxGeometry(W, 0.4, L); geoS1.translate(0, 0.2, L/2);
                const meshS1 = new THREE.Mesh(geoS1, mat); addEdges(meshS1, geoS1); rail.add(meshS1);
                const geoS2 = new THREE.BoxGeometry(W, 0.4, L); geoS2.translate(-OFFSET, 0.2, L/2);
                const meshS2 = new THREE.Mesh(geoS2, mat); addEdges(meshS2, geoS2); rail.add(meshS2);

                const shapeB1 = new THREE.Shape(); shapeB1.absarc(L, 0, L + W/2, Math.PI, Math.PI/2, true); shapeB1.absarc(L, 0, L - W/2, Math.PI/2, Math.PI, false);
                const geoB1 = new THREE.ExtrudeGeometry(shapeB1, { depth: 0.4, bevelEnabled: false, curveSegments: 32 }); geoB1.rotateX(Math.PI/2); geoB1.translate(0, 0.4, 0);
                const meshB1 = new THREE.Mesh(geoB1, mat); addEdges(meshB1, geoB1); rail.add(meshB1);

                const shapeB2 = new THREE.Shape(); shapeB2.absarc(L, 0, L+OFFSET + W/2, Math.PI, Math.PI/2, true); shapeB2.absarc(L, 0, L+OFFSET - W/2, Math.PI/2, Math.PI, false);
                const geoB2 = new THREE.ExtrudeGeometry(shapeB2, { depth: 0.4, bevelEnabled: false, curveSegments: 32 }); geoB2.rotateX(Math.PI/2); geoB2.translate(0, 0.4, 0);
                const meshB2 = new THREE.Mesh(geoB2, mat); addEdges(meshB2, geoB2); rail.add(meshB2);
            }
            // ▼ ここが修正ポイント：複線ターンアウト（右）の生成
            else if (type === 'double_turnout_R' || type === 'double_turnout_R_flip') {
                const geoS1 = new THREE.BoxGeometry(W, 0.4, L);
                geoS1.translate(0, 0.2, L/2);
                const meshS1 = new THREE.Mesh(geoS1, mat); addEdges(meshS1, geoS1); rail.add(meshS1);

                const geoS2 = new THREE.BoxGeometry(W, 0.4, L);
                geoS2.translate(-OFFSET, 0.2, L/2);
                const meshS2 = new THREE.Mesh(geoS2, mat); addEdges(meshS2, geoS2); rail.add(meshS2);

                const shapeB1 = new THREE.Shape();
                shapeB1.absarc(-(L+OFFSET), 0, L+OFFSET + W/2, 0, Math.PI/2, false);
                shapeB1.absarc(-(L+OFFSET), 0, L+OFFSET - W/2, Math.PI/2, 0, true);
                const geoB1 = new THREE.ExtrudeGeometry(shapeB1, { depth: 0.4, bevelEnabled: false, curveSegments: 32 });
                geoB1.rotateX(Math.PI/2); geoB1.translate(0, 0.4, 0);
                const meshB1 = new THREE.Mesh(geoB1, mat); addEdges(meshB1, geoB1); rail.add(meshB1);

                const shapeB2 = new THREE.Shape();
                shapeB2.absarc(-(L+OFFSET), 0, L + W/2, 0, Math.PI/2, false);
                shapeB2.absarc(-(L+OFFSET), 0, L - W/2, Math.PI/2, 0, true);
                const geoB2 = new THREE.ExtrudeGeometry(shapeB2, { depth: 0.4, bevelEnabled: false, curveSegments: 32 });
                geoB2.rotateX(Math.PI/2); geoB2.translate(0, 0.4, 0);
                const meshB2 = new THREE.Mesh(geoB2, mat); addEdges(meshB2, geoB2); rail.add(meshB2);
            }
            else if (type.startsWith('turnout_')) {
                const isR = type.includes('_R_');
                const geoS = new THREE.BoxGeometry(W, 0.4, L); geoS.translate(0, 0.2, L/2);
                const meshS = new THREE.Mesh(geoS, mat); addEdges(meshS, geoS); rail.add(meshS);

                const shapeC = new THREE.Shape();
                if (isR) { shapeC.absarc(-L, 0, L + W/2, 0, Math.PI/4, false); shapeC.absarc(-L, 0, L - W/2, Math.PI/4, 0, true); }
                else { shapeC.absarc(L, 0, L + W/2, Math.PI, Math.PI - Math.PI/4, true); shapeC.absarc(L, 0, L - W/2, Math.PI - Math.PI/4, Math.PI, false); }
                const geoC = new THREE.ExtrudeGeometry(shapeC, { depth: 0.4, bevelEnabled: false, curveSegments: 16 });
                geoC.rotateX(Math.PI/2); geoC.translate(0, 0.4, 0);
                const meshC = new THREE.Mesh(geoC, mat); addEdges(meshC, geoC); rail.add(meshC);
            }

            // --- ペグ（接続判定用）の追加 ---
            const addPeg = (x, y, z, dx, dy, dz) => {
                const pGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5); pGeo.translate(x, y + 0.2, z);
                const pMesh = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color: 0xff0000, visible: false }));
                pMesh.userData.ignoreRaycast = true; rail.add(pMesh);
            };

            if (type === 'straight' || type === 'double_straight') addPeg(...pS);
            else if (type === 'double_length_straight') addPeg(0, 0, 2*L, 0, 0, 1);
            else if (type === 'half_straight') addPeg(0, 0, L/2, 0, 0, 1);
            else if (type.startsWith('quarter_straight')) addPeg(0, 0, L/4, 0, 0, 1);
            else if (type === 'double_length_curve_left') addPeg(L, 0, L, 1, 0, 0);
            else if (type === 'double_length_curve_right') addPeg(-L, 0, L, -1, 0, 0);
            else if (type === 's_curve_L' || type === 's_curve_L_flip') addPeg(OFFSET, 0, L, 0, 0, 1);
            else if (type === 's_curve_R' || type === 's_curve_R_flip') addPeg(-OFFSET, 0, L, 0, 0, 1);
            else if (type === 'slope_up' || type === 'slope_up_flip') addPeg(0, H_UNIT, 2*L, 0, 0, 1);
            else if (type === 'slope_down' || type === 'slope_down_flip') addPeg(0, 0, 2*L, 0, 0, 1);
            else if (type === 'slope_curve_A') addPeg(pCL[0], H_UNIT/4, pCL[2], pCL[3], pCL[4], pCL[5]);
            else if (type === 'slope_curve_B') addPeg(0, 0, 0, 0, 0, -1);
            else if (type === 'curve_left') addPeg(...pCL);
            else if (type === 'curve_right') addPeg(...pCR);
            else if (type === 'outer_curve_left') addPeg(...pOCL);
            else if (type === 'outer_curve_right') addPeg(...pOCR);
            else if (type === 'double_curve_left') { addPeg(...pCL); addPeg(L-(L+OFFSET)*Math.cos(Math.PI/4), 0, (L+OFFSET)*Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)); }
            // ▼ ここが修正ポイント：複線曲線（右）のペグ生成
            else if (type === 'double_curve_right') { 
                addPeg(...pOCR); 
                addPeg(-(L+OFFSET) + L*Math.cos(Math.PI/4), 0, L*Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4));
            }
            else if (type === 'double_turnout_L' || type === 'double_turnout_L_flip') { addPeg(...pS); addPeg(-OFFSET, 0, L, 0, 0, 1); addPeg(L, 0, L, 1, 0, 0); addPeg(L, 0, L+OFFSET, 1, 0, 0); }
            // ▼ ここが修正ポイント：複線ターンアウト（右）のペグ生成
            else if (type === 'double_turnout_R' || type === 'double_turnout_R_flip') {
                addPeg(0, 0, L, 0, 0, 1);
                addPeg(-OFFSET, 0, L, 0, 0, 1);
                addPeg(-(L+OFFSET), 0, L+OFFSET, -1, 0, 0);
                addPeg(-(L+OFFSET), 0, L, -1, 0, 0);
            }
            else if (type === 'turnout_L_out') { addPeg(...pS); addPeg(...pCL); }
            else if (type === 'turnout_R_out') { addPeg(...pS); addPeg(...pCR); }

            return rail;
        }

        window.addRail = (baseType) => {
            let actualType = baseType;
            if (railPrefs[baseType]) { actualType = railPrefs[baseType]; }
            const rail = createRailObject(actualType);
            rail.position.set(orbit.target.x, 0, orbit.target.z);
            scene.add(rail); rails.push(rail);
            selectedObject = rail; highlight(rail);
            checkSnap(rail, true); updatePiers();
        };

        function isConnected(rail) {
            const m = getJointData(rail);
            return rails.some(o => o !== rail && getJointData(o).some(oj => m.some(mj => mj.pos.distanceTo(oj.pos) < 0.1)));
        }

        window.flipCurve = () => {
            if (!selectedObject) return;
            const t = selectedObject.userData.type;
            if (isConnected(selectedObject)) return showMessage("接続中は変更できません。");
            
            const map = {
                'curve_right':'curve_left', 'curve_left':'curve_right',
                'double_length_curve_right':'double_length_curve_left', 'double_length_curve_left':'double_length_curve_right',
                's_curve_L':'s_curve_R', 's_curve_R':'s_curve_L', 's_curve_L_flip':'s_curve_R_flip', 's_curve_R_flip':'s_curve_L_flip',
                'turnout_L_out':'turnout_R_out', 'turnout_R_out':'turnout_L_out', 'turnout_L_in':'turnout_R_in', 'turnout_R_in':'turnout_L_in',
                'slope_curve_A':'slope_curve_B', 'slope_curve_B':'slope_curve_A',
                'double_curve_right':'double_curve_left', 'double_curve_left':'double_curve_right',
                'outer_curve_right':'outer_curve_left', 'outer_curve_left':'outer_curve_right',
                'double_turnout_L':'double_turnout_R', 'double_turnout_R':'double_turnout_L',
                'double_turnout_L_flip':'double_turnout_R_flip', 'double_turnout_R_flip':'double_turnout_L_flip'
            };
            
            if (map[t]) replaceSelectedRail(map[t]);
        };

        window.flipGender = () => {
            if (!selectedObject) return;
            const t = selectedObject.userData.type;
            if (isConnected(selectedObject)) return showMessage("接続中は変更できません。");
            
            if (t === 'quarter_straight_MM') replaceSelectedRail('quarter_straight_FF');
            else if (t === 'quarter_straight_FF') replaceSelectedRail('quarter_straight_MM');
            else if (t === 'quarter_straight') replaceSelectedRail('quarter_straight_MM');
            else if (t.includes('s_curve') || t.includes('slope_up') || t.includes('slope_down') || t.includes('3way') || t.includes('double_turnout')) {
                if (t.includes('_flip')) replaceSelectedRail(t.replace('_flip', ''));
                else replaceSelectedRail(t + '_flip');
            } else if (t.endsWith('_out')) replaceSelectedRail(t.replace('_out', '_in'));
            else if (t.endsWith('_in')) replaceSelectedRail(t.replace('_in', '_out'));
        };

        function replaceSelectedRail(newType) {
            const p = selectedObject.position.clone(), r = selectedObject.rotation.y, baseY = selectedObject.userData.baseY;
            scene.remove(selectedObject);
            const i = rails.indexOf(selectedObject);
            if (i > -1) rails.splice(i, 1);
            
            const newRail = createRailObject(newType);
            newRail.position.copy(p); newRail.rotation.y = r;
            newRail.userData.baseY = baseY !== undefined ? baseY : p.y;
            scene.add(newRail); rails.push(newRail);
            selectedObject = newRail; highlight(newRail);
            updatePiers();
        }

        window.rotate = (steps) => {
            if (!selectedObject) return showMessage("レールを選択してください。");
            if (isConnected(selectedObject)) return showMessage("接続中は回転できません。");
            selectedObject.rotation.y += steps * Math.PI / 4;
            selectedObject.updateMatrixWorld();
            checkSnap(selectedObject, false);
            updatePiers();
        };

        window.deleteRail = () => {
            if (selectedObject) {
                scene.remove(selectedObject);
                const i = rails.indexOf(selectedObject);
                if (i > -1) rails.splice(i, 1);
                selectedObject = null;
                updatePiers();
            }
        };

        window.saveToBrowser = () => {
            localStorage.setItem('railLayout', JSON.stringify(rails.map(r => ({ t: r.userData.type, x: r.position.x, y: r.position.y, z: r.position.z, ry: r.rotation.y }))));
            showMessage("💾 保存しました");
        };

        window.loadFromBrowser = () => {
            const s = localStorage.getItem('railLayout');
            if (!s) return showMessage("保存データがありません");
            rails.forEach(r => scene.remove(r)); rails.length = 0; 
            JSON.parse(s).forEach(d => { const r = createRailObject(d.t); r.position.set(d.x, d.y, d.z); r.rotation.y = d.ry; scene.add(r); rails.push(r); }); 
            updatePiers(); showMessage("📂 読込完了"); 
        };
        
        window.exportJSON = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(rails.map(r => ({ t: r.userData.type, x: r.position.x, y: r.position.y, z: r.position.z, ry: r.rotation.y })))], { type: 'application/json' }));
            a.download = 'layout.json'; a.click(); showMessage("📤 書出完了");
        };

        window.importJSON = (e) => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    rails.forEach(r => scene.remove(r)); rails.length = 0; 
                    JSON.parse(ev.target.result).forEach(d => { const r = createRailObject(d.t); r.position.set(d.x, d.y, d.z); r.rotation.y = d.ry; scene.add(r); rails.push(r); });
                    updatePiers(); showMessage("📥 読込完了");
                } catch(e) { showMessage("読込エラー"); }
            };
            reader.readAsText(f);
            e.target.value = "";
        };

        function highlight(obj) {
            rails.forEach(r => r.children.forEach(c => { if (c.material === matYellow) c.material = matNormal; }));
            if (obj) obj.children.forEach(c => { if (c.material === matNormal) c.material = matYellow; });
        }

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
