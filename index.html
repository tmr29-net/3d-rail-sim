<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Rail Sim - Height & Piers</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; background: #1a1a1a; }
        #ui { position: absolute; top: 10px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; z-index: 10; width: 250px; max-height: 95vh; overflow-y: auto; padding-right: 5px; }
        #ui::-webkit-scrollbar { width: 6px; } #ui::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        button { padding: 8px; font-size: 12px; cursor: pointer; border: none; border-radius: 6px; background: #2196F3; color: white; font-weight: bold; width: 100%; transition: opacity 0.2s; box-sizing: border-box; }
        button:active { opacity: 0.7; }
        .inst { position: absolute; bottom: 10px; left: 10px; color: #ccc; font-size: 12px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; line-height: 1.4;}
        #status { color: #ff5252; font-weight: bold; margin-top: 5px; min-height: 1.2em; text-shadow: 1px 1px 2px black; font-size: 12px; width: 100%; }
        
        .flex-row { display: flex; gap: 5px; width: 100%; }
        .flex-row button { flex: 1; padding: 8px 4px; }
        .divider { width: 100%; height: 1px; background: #444; margin: 3px 0; }
        .category-label { color: #ccc; font-size: 11px; width: 100%; margin-bottom: -2px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="category-label">▼ 単線レール群</div>
        <button onclick="addRail('straight')">直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_length_straight')">2倍直線</button>
            <button onclick="addRail('half_straight')" style="background:#42A5F5;">1/2直線</button>
            <button onclick="addRail('quarter_straight')" style="background:#64B5F6; color:#000;">1/4直線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('curve_right')">曲線 (右)</button>
            <button onclick="addRail('curve_left')">曲線 (左)</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('turnout_L_out')" style="background:#00BCD4;">ターンアウト</button>
            <button onclick="addRail('fig8_F_RM')" style="background:#00ACC1;">8の字ポイント</button>
        </div>
        <button onclick="addRail('y_point_F_RM')" style="background:#0097A7;">Y字分岐</button>

        <div class="divider"></div>
        <div class="category-label">▼ 坂・高架レール群</div>
        <div class="flex-row">
            <button onclick="addRail('slope_up')" style="background:#ffb300; color:#000;">坂レール (上り)</button>
            <button onclick="addRail('slope_down')" style="background:#ffb300; color:#000;">坂レール (下り)</button>
        </div>

        <div class="divider"></div>
        <div class="category-label">▼ 特殊レール群</div>
        <div class="flex-row">
            <button onclick="addRail('uturn_L')" style="background:#e53935;">Uターン (赤)</button>
            <button onclick="addRail('3way_A')" style="background:#8e24aa;">3分岐レール</button>
        </div>
        
        <div class="divider"></div>
        <div class="category-label">▼ 複線レール群</div>
        <button onclick="addRail('double_straight')" style="background:#283593;">複線 直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_curve_right')" style="background:#283593;">複線 曲線(右)</button>
            <button onclick="addRail('double_curve_left')" style="background:#283593;">複線 曲線(左)</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('outer_curve_right')" style="background:#3949AB;">複外 曲線(右)</button>
            <button onclick="addRail('outer_curve_left')" style="background:#3949AB;">複外 曲線(左)</button>
        </div>
        <button onclick="addRail('double_point_L_out')" style="background:#00897B;">単線・複線ポイント</button>
        <div class="flex-row">
            <button onclick="addRail('double_crossover_L')" style="background:#00695C;">渡り(左)</button>
            <button onclick="addRail('double_crossover_R')" style="background:#00695C;">渡り(右)</button>
        </div>

        <div class="divider"></div>
        <div class="category-label">▼ 操作・編集</div>
        <div class="flex-row">
            <button onclick="changeHeight(1)" style="background:#00BCD4;">高さを上げる ⬆️</button>
            <button onclick="changeHeight(-1)" style="background:#0097A7;">高さを下げる ⬇️</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(1)" style="background:#4CAF50;">↺ 左45°</button>
            <button onclick="rotate(-1)" style="background:#4CAF50;">右45° ↻</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(2)" style="background:#43A047;">↺ 左90°</button>
            <button onclick="rotate(4)" style="background:#388E3C;">180°反転</button>
            <button onclick="rotate(-2)" style="background:#43A047;">右90° ↻</button>
        </div>

        <button onclick="flipCurve()" style="background:#9C27B0;">レール裏返し (左右反転) ⇄</button>
        <button onclick="flipGender()" style="background:#E91E63;">ジョイント(凸凹)入替</button>
        
        <div class="flex-row">
            <button onclick="toggleArrows()" style="background:#FF9800;">矢印 表示</button>
            <button onclick="deleteRail()" style="background:#f44336;">選択削除</button>
        </div>
        
        <div class="divider"></div>

        <div class="flex-row">
            <button onclick="saveToBrowser()" style="background:#607D8B;">💾 保存</button>
            <button onclick="loadFromBrowser()" style="background:#607D8B;">📂 読込</button>
        </div>
        <div class="flex-row">
            <button onclick="exportJSON()" style="background:#795548;">📤 書出</button>
            <button onclick="document.getElementById('fileInput').click()" style="background:#795548;">📥 読込</button>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importJSON(event)">

        <div id="status"></div>
    </div>
    
    <div class="inst">
        ◆ 選択中レールの高さはボタン「⬆️/⬇️」で変更可能<br>
        ◆ 高架になると自動で黄色いブロック橋脚が設置されます。<br>
        ◆ ポイント・分岐や坂レールは「ジョイント入替」で仕様変更可能です。<br>
        ◆ 視点移動: 右クリック(2本指)ドラッグ
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, orbit;
        const rails = [];
        const arrowMeshes = [];
        let selectedObject = null;
        let arrowsVisible = true;
        
        const L = 10; 
        const W = 1.8;
        const SNAP_DIST = 2.5; 
        const OFFSET = 2.8;
        const H_UNIT = 3.0; // 高さレベル1あたりのY座標

        const matNormal = new THREE.MeshPhongMaterial({ color: 0x0072bc });
        const matDark = new THREE.MeshPhongMaterial({ color: 0x004488 });
        const matRed = new THREE.MeshPhongMaterial({ color: 0xcc2222 });
        const matYellow = new THREE.MeshPhongMaterial({ color: 0xffd600 }); // 橋脚用

        const p0 = [0, 0, 0, 0, 0, -1];
        const pS = [0, 0, L, 0, 0, 1];
        const pCR = [L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pCL = [-L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pOCR = [(L+OFFSET) * (1 - Math.cos(Math.PI/4)), 0, (L+OFFSET) * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pOCL = [- (L+OFFSET) * (1 - Math.cos(Math.PI/4)), 0, (L+OFFSET) * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];

        let pierGroup;
        let pierGeo, pierEdges, pierEdgeMat;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(20, 40, 30);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(200, 40, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);
            
            // 橋脚グループの準備
            pierGroup = new THREE.Group();
            scene.add(pierGroup);
            pierGeo = new THREE.BoxGeometry(W * 1.5, H_UNIT, 2.5);
            pierGeo.translate(0, H_UNIT/2, 0); // 底面を原点に
            pierEdges = new THREE.EdgesGeometry(pierGeo);
            pierEdgeMat = new THREE.LineBasicMaterial({ color: 0xb89a00 });

            orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true; 
            setupCustomDrag();
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function setupCustomDrag() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let draggingRail = null;
            let dragOffset = new THREE.Vector3();
            const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            renderer.domElement.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const validHits = raycaster.intersectObjects(rails, true).filter(h => h.object.type === 'Mesh' && !h.object.userData.ignoreRaycast);
                if (validHits.length > 0) {
                    let obj = validHits[0].object;
                    while (obj && !rails.includes(obj)) obj = obj.parent;
                    if (obj) {
                        orbit.enabled = false; selectedObject = obj; draggingRail = obj; highlight(obj);
                        const hitPt = new THREE.Vector3();
                        
                        // 現在のレールのY座標に合わせてドラッグ平面を設定
                        const planeY = obj.position.y;
                        dragPlane.constant = -planeY;
                        obj.userData.baseY = planeY;

                        if (raycaster.ray.intersectPlane(dragPlane, hitPt)) dragOffset.copy(hitPt).sub(obj.position);
                        renderer.domElement.setPointerCapture(e.pointerId);
                    }
                } else { selectedObject = null; highlight(null); }
            });

            renderer.domElement.addEventListener('pointermove', (e) => {
                if (draggingRail) {
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const hitPt = new THREE.Vector3();
                    if (raycaster.ray.intersectPlane(dragPlane, hitPt)) {
                        draggingRail.position.copy(hitPt).sub(dragOffset); 
                        draggingRail.position.y = draggingRail.userData.baseY; // 一旦元の高さを維持
                        checkSnap(draggingRail); // スナップすればY座標も上書きされる
                    }
                }
            });
            const onPointerUp = (e) => { 
                if (draggingRail) {
                    renderer.domElement.releasePointerCapture(e.pointerId); 
                    updatePiers(); // ドラッグ完了時に橋脚を更新
                }
                draggingRail = null; orbit.enabled = true; 
            };
            renderer.domElement.addEventListener('pointerup', onPointerUp);
        }

        // --- 高さ変更機能 ---
        window.changeHeight = (delta) => {
            if (!selectedObject) {
                return showMessage("レールを選択してください。");
            }
            if (isConnected(selectedObject)) {
                return showMessage("接続中は高さを変更できません。");
            }
            
            selectedObject.position.y += delta * H_UNIT;
            
            // 地面より下には行かないように制限
            if (selectedObject.position.y < 0) {
                selectedObject.position.y = 0;
            }
            
            selectedObject.userData.baseY = selectedObject.position.y; // ドラッグ用の基準高さを更新
            checkSnap(selectedObject);
            updatePiers();
        };

        // --- 橋脚マネージャー ---
        function updatePiers() {
            pierGroup.clear();
            const spots = [];

            // 全レールの全ジョイントを収集し、同じ場所(X,Z)にある最大高さを計算
            rails.forEach(rail => {
                const joints = getJointData(rail);
                joints.forEach(j => {
                    const level = Math.round(j.pos.y / H_UNIT);
                    if (level > 0) {
                        let found = spots.find(s => Math.hypot(s.x - j.pos.x, s.z - j.pos.z) < 0.5);
                        if (found) {
                            found.maxY = Math.max(found.maxY, j.pos.y);
                        } else {
                            let rotY = Math.atan2(j.dir.x, j.dir.z); // 水平方向の向き
                            spots.push({ x: j.pos.x, z: j.pos.z, maxY: j.pos.y, rotY });
                        }
                    }
                });
            });

            // 収集したスポットに橋脚を積み上げる
            spots.forEach(spot => {
                const maxLevel = Math.round(spot.maxY / H_UNIT);
                for (let i = 0; i < maxLevel; i++) {
                    const mesh = new THREE.Mesh(pierGeo, matYellow);
                    mesh.position.set(spot.x, i * H_UNIT, spot.z);
                    mesh.rotation.y = spot.rotY;
                    const edges = new THREE.LineSegments(pierEdges, pierEdgeMat);
                    mesh.add(edges);
                    pierGroup.add(mesh);
                }
            });
        }

        function getJointData(rail) {
            rail.updateMatrixWorld();
            const joints = [], m = rail.matrixWorld, q = rail.quaternion, type = rail.userData.type;
            const addJoint = (id, x, y, z, dx, dy, dz, gender) => {
                joints.push({ id, pos: new THREE.Vector3(x, y, z).applyMatrix4(m), dir: new THREE.Vector3(dx, dy, dz).applyQuaternion(q).normalize(), gender });
            };

            if (type === 'straight') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); }
            else if (type === 'double_length_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, 2*L, 0, 0, 1, 'M'); }
            else if (type === 'half_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/2, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight_MM') { addJoint(0, ...p0, 'M'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight_FF') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'F'); }
            
            // 坂レール
            else if (type === 'slope_up') { addJoint(0, 0,0,0, 0,0,-1, 'F'); addJoint(1, 0,H_UNIT,2*L, 0,0,1, 'M'); }
            else if (type === 'slope_down') { addJoint(0, 0,H_UNIT,0, 0,0,-1, 'F'); addJoint(1, 0,0,2*L, 0,0,1, 'M'); }
            else if (type === 'slope_up_flip') { addJoint(0, 0,0,0, 0,0,-1, 'M'); addJoint(1, 0,H_UNIT,2*L, 0,0,1, 'F'); }
            else if (type === 'slope_down_flip') { addJoint(0, 0,H_UNIT,0, 0,0,-1, 'M'); addJoint(1, 0,0,2*L, 0,0,1, 'F'); }

            else if (type === 'curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'M'); }
            else if (type === 'curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCL, 'M'); }
            else if (type === 'outer_curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, ...pOCR, 'M'); }
            else if (type === 'outer_curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, ...pOCL, 'M'); }
            else if (type === 'uturn_L') { addJoint(0, ...p0, 'F'); addJoint(1, -OFFSET, 0, 0, 0, 0, -1, 'F'); }
            else if (type === 'uturn_R') { addJoint(0, ...p0, 'F'); addJoint(1, OFFSET, 0, 0, 0, 0, -1, 'F'); }
            else if (type === '3way_A') { addJoint(0, ...p0, 'M'); addJoint(1, ...pS, 'F'); addJoint(2, ...pCL, 'M'); addJoint(3, ...pCR, 'F'); }
            else if (type === '3way_B') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'F'); addJoint(3, ...pCR, 'M'); }
            else if (type === '3way_A_flip') { addJoint(0, ...p0, 'M'); addJoint(1, ...pS, 'F'); addJoint(2, ...pCL, 'F'); addJoint(3, ...pCR, 'M'); }
            else if (type === '3way_B_flip') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'M'); addJoint(3, ...pCR, 'F'); }
            else if (type === 'double_straight' || type.startsWith('double_crossover_')) {
                addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
            }
            else if (type === 'double_curve_right') {
                addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, L - (L+OFFSET)*Math.cos(Math.PI/4), 0, (L+OFFSET)*Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            else if (type === 'double_curve_left') {
                addJoint(0, ...p0, 'F'); addJoint(1, ...pCL, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, -L + (L-OFFSET)*Math.cos(Math.PI/4), 0, (L-OFFSET)*Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            else if (type === 'turnout_L_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'turnout_R_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCR, 'M'); }
            else if (type === 'turnout_L_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'turnout_R_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, ...pCR, 'F'); }
            else if (type === 'fig8_F_RM') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'M'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'fig8_M_RM') { addJoint(0, ...p0, 'M'); addJoint(1, ...pCR, 'M'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'fig8_F_LM') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'F'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'fig8_M_LM') { addJoint(0, ...p0, 'M'); addJoint(1, ...pCR, 'F'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'y_point_F_RM') { addJoint(0, ...p0, 'F'); addJoint(1, 2.5, 0, L, 0, 0, 1, 'M'); addJoint(2, -2.5, 0, L, 0, 0, 1, 'F'); }
            else if (type === 'y_point_M_RM') { addJoint(0, ...p0, 'M'); addJoint(1, 2.5, 0, L, 0, 0, 1, 'M'); addJoint(2, -2.5, 0, L, 0, 0, 1, 'F'); }
            else if (type === 'y_point_F_LM') { addJoint(0, ...p0, 'F'); addJoint(1, 2.5, 0, L, 0, 0, 1, 'F'); addJoint(2, -2.5, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'y_point_M_LM') { addJoint(0, ...p0, 'M'); addJoint(1, 2.5, 0, L, 0, 0, 1, 'F'); addJoint(2, -2.5, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'double_point_L_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, -OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'double_point_R_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'double_point_L_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, -OFFSET, 0, L, 0, 0, 1, 'F'); }
            else if (type === 'double_point_R_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, OFFSET, 0, L, 0, 0, 1, 'F'); }
            return joints;
        }

        function checkSnap(dragged) {
            dragged.updateMatrixWorld();
            const myJoints = getJointData(dragged);
            const occupied = [];
            rails.forEach(r => getJointData(r).forEach(j => occupied.push({ rail: r, pos: j.pos })));

            for (let other of rails) {
                if (other === dragged) continue;
                for (let mj of myJoints) {
                    for (let oj of getJointData(other)) {
                        // 3次元距離でスナップ判定 (Y座標の差も考慮される)
                        if (mj.pos.distanceTo(oj.pos) < SNAP_DIST && mj.dir.dot(oj.dir) < -0.9 && mj.gender !== oj.gender) {
                            if (occupied.filter(occ => occ.rail !== dragged && occ.pos.distanceTo(oj.pos) < 0.1).length >= 2) continue;
                            
                            // 相手のジョイント位置にピタッと合わせる (Y軸も追従)
                            dragged.position.add(new THREE.Vector3().subVectors(oj.pos, mj.pos));
                            dragged.updateMatrixWorld();
                            return;
                        }
                    }
                }
            }
        }

        function createRailObject(type) {
            const isDoubleTrack = (type.startsWith('double_') && type !== 'double_length_straight') || type.startsWith('outer_');
            let mat = isDoubleTrack ? matDark.clone() : matNormal.clone(); 
            if (type.startsWith('uturn')) mat = matRed.clone();
            
            let geometry;

                'turnout_L_in':'turnout_R_in', 'turnout_R_in':'turnout_L_in', 
                'double_point_L_out':'double_point_R_out', 'double_point_R_out':'double_point_L_out', 
                'double_point_L_in':'double_point_R_in', 'double_point_R_in':'double_point_L_in', 
                'double_curve_right':'double_curve_left', 'double_curve_left':'double_curve_right',
                'double_crossover_L':'double_crossover_R', 'double_crossover_R':'double_crossover_L',
                'fig8_F_RM':'fig8_F_LM', 'fig8_F_LM':'fig8_F_RM',
                'fig8_M_RM':'fig8_M_LM', 'fig8_M_LM':'fig8_M_RM',
                'y_point_F_RM':'y_point_F_LM', 'y_point_F_LM':'y_point_F_RM',
                'y_point_M_RM':'y_point_M_LM', 'y_point_M_LM':'y_point_M_RM',
                'uturn_L':'uturn_R', 'uturn_R':'uturn_L',
                '3way_A':'3way_A_flip', '3way_A_flip':'3way_A',     
                '3way_B':'3way_B_flip', '3way_B_flip':'3way_B'      
            };
            if (map[t]) replaceSelectedRail(map[t]);
        };

        window.flipGender = () => {
            if (!selectedObject) return;
            const t = selectedObject.userData.type;
            if (isConnected(selectedObject)) return showMessage("接続中は変更できません。");
            
            if (t === 'quarter_straight') replaceSelectedRail('quarter_straight_MM');
            else if (t === 'quarter_straight_MM') replaceSelectedRail('quarter_straight_FF');
            else if (t === 'quarter_straight_FF') replaceSelectedRail('quarter_straight');
            else if (t === 'slope_up') replaceSelectedRail('slope_up_flip');
            else if (t === 'slope_up_flip') replaceSelectedRail('slope_up');
            else if (t === 'slope_down') replaceSelectedRail('slope_down_flip');
            else if (t === 'slope_down_flip') replaceSelectedRail('slope_down');
            else if (t === 'fig8_F_RM') replaceSelectedRail('fig8_M_RM');
            else if (t === 'fig8_M_RM') replaceSelectedRail('fig8_F_RM');
            else if (t === 'fig8_F_LM') replaceSelectedRail('fig8_M_LM');
            else if (t === 'fig8_M_LM') replaceSelectedRail('fig8_F_LM');
            else if (t === 'y_point_F_RM') replaceSelectedRail('y_point_M_RM');
            else if (t === 'y_point_M_RM') replaceSelectedRail('y_point_F_RM');
            else if (t === 'y_point_F_LM') replaceSelectedRail('y_point_M_LM');
            else if (t === 'y_point_M_LM') replaceSelectedRail('y_point_F_LM');
            else if (t === '3way_A') replaceSelectedRail('3way_B');
            else if (t === '3way_B') replaceSelectedRail('3way_A');
            else if (t === '3way_A_flip') replaceSelectedRail('3way_B_flip');
            else if (t === '3way_B_flip') replaceSelectedRail('3way_A_flip');
            else if (t.endsWith('_out')) replaceSelectedRail(t.replace('_out', '_in'));
            else if (t.endsWith('_in')) replaceSelectedRail(t.replace('_in', '_out'));
        };

        function replaceSelectedRail(newType) {
            const p = selectedObject.position.clone(), r = selectedObject.rotation.y; window.deleteRail(); 
            const n = createRailObject(newType); n.position.copy(p); n.rotation.y = r;
            scene.add(n); rails.push(n); selectedObject = n; highlight(n); checkSnap(n);
            updatePiers();
        }

        window.toggleArrows = () => { arrowsVisible = !arrowsVisible; arrowMeshes.forEach(a => a.visible = arrowsVisible); };
        window.rotate = (dir) => { 
            if (selectedObject && !isConnected(selectedObject)) { 
                selectedObject.rotation.y += (Math.PI/4)*dir; checkSnap(selectedObject); updatePiers();
            } else if (selectedObject) showMessage("接続中は回転できません。"); 
        };
        window.deleteRail = () => { 
            if (selectedObject) { scene.remove(selectedObject); rails.splice(rails.indexOf(selectedObject), 1); selectedObject = null; highlight(null); updatePiers(); } 
        };
        
        function highlight(obj) {
            rails.forEach(r => r.traverse(c => { if (c.material && c.material.emissive) c.material.emissive.setHex(0); }));
            if(obj) obj.traverse(c => { if (c.material && c.material.emissive) c.material.emissive.setHex(0x444444); });
        }
        function showMessage(text) { const el = document.getElementById('status'); el.innerText = text; setTimeout(() => { if(el.innerText === text) el.innerText = ""; }, 2000); }

        window.saveToBrowser = () => { localStorage.setItem('3dRailSim', JSON.stringify(rails.map(r => ({ t: r.userData.type, x: r.position.x, y: r.position.y, z: r.position.z, ry: r.rotation.y })))); showMessage("💾 保存完了"); };
        window.loadFromBrowser = () => { 
            const s = localStorage.getItem('3dRailSim'); if (!s) return; 
            rails.forEach(r => scene.remove(r)); rails.length = 0; arrowMeshes.length = 0; 
            JSON.parse(s).forEach(d => { const r = createRailObject(d.t); r.position.set(d.x, d.y, d.z); r.rotation.y = d.ry; scene.add(r); rails.push(r); }); 
            updatePiers(); showMessage("📂 読込完了"); 
        };
        
        window.exportJSON = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(rails.map(r => ({ t: r.userData.type, x: r.position.x, y: r.position.y, z: r.position.z, ry: r.rotation.y })))], { type: 'application/json' }));
            a.download = 'layout.json'; a.click(); showMessage("📤 書出完了");
        };
        window.importJSON = (e) => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    rails.forEach(r => scene.remove(r)); rails.length = 0; arrowMeshes.length = 0;
                    JSON.parse(ev.target.result).forEach(d => { const r = createRailObject(d.t); r.position.set(d.x, d.y, d.z); r.rotation.y = d.ry; scene.add(r); rails.push(r); });
                    updatePiers(); showMessage("📥 読込完了");
                } catch (err) { showMessage("エラー: 不正なファイルです"); }
            };
            reader.readAsText(f); e.target.value = '';
        };

        function animate() { requestAnimationFrame(animate); orbit.update(); renderer.render(scene, camera); }
    </script>
</body>
</html>
