<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Rail Sim - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; background: #1a1a1a; }
        #ui { position: absolute; top: 10px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; z-index: 10; width: 250px; max-height: 95vh; overflow-y: auto; padding-right: 5px; }
        #ui::-webkit-scrollbar { width: 6px; } #ui::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        button { padding: 8px; font-size: 11px; cursor: pointer; border: none; border-radius: 6px; background: #2196F3; color: white; font-weight: bold; width: 100%; transition: opacity 0.2s; box-sizing: border-box; }
        button:active { opacity: 0.7; }
        .inst { position: absolute; bottom: 10px; left: 10px; color: #ccc; font-size: 12px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; line-height: 1.4;}
        #status { color: #ff5252; font-weight: bold; margin-top: 5px; min-height: 1.2em; text-shadow: 1px 1px 2px black; font-size: 12px; width: 100%; }
        .flex-row { display: flex; gap: 5px; width: 100%; }
        .flex-row button { flex: 1; padding: 8px 2px; }
        .divider { width: 100%; height: 1px; background: #444; margin: 3px 0; }
        .category-label { color: #ccc; font-size: 11px; width: 100%; margin-bottom: -2px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="category-label">▼ 基本レール群</div>
        <button onclick="addRail('straight')">直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_length_straight')">2倍直線</button>
            <button onclick="addRail('half_straight')" style="background:#42A5F5;">1/2直線</button>
            <button onclick="addRail('quarter_straight')" style="background:#64B5F6; color:#000;">1/4直線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('curve')">曲線</button>
            <button onclick="addRail('double_length_curve')">2倍曲線(90°)</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('s_curve')" style="background:#1E88E5;">S字カーブ</button>
            <button onclick="addRail('turnout')" style="background:#00BCD4;">ターンアウト</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('fig8')" style="background:#00ACC1;">8の字</button>
            <button onclick="addRail('y_point')" style="background:#0097A7;">Y字分岐</button>
        </div>
        <button onclick="addRail('3way')" style="background:#8e24aa;">3分岐レール</button>

        <div class="divider"></div>
        <div class="category-label">▼ 坂・高架レール群</div>
        <button onclick="addRail('slope')" style="background:#ffb300; color:#000;">直線坂</button>
        <div class="flex-row">
            <button onclick="addRail('slope_curve_A')" style="background:#FF9800; color:#000;">坂曲線A</button>
            <button onclick="addRail('slope_curve_B')" style="background:#FF9800; color:#000;">坂曲線B</button>
        </div>
        
        <div class="divider"></div>
        <div class="category-label">▼ 複線レール群</div>
        <button onclick="addRail('double_straight')">複線 直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_curve')">複線 曲線</button>
            <button onclick="addRail('outer_curve')">複外 曲線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('double_point')" style="background:#00897B;">単線・複線ポイント</button>
            <button onclick="addRail('double_turnout')" style="background:#00ACC1;">複線分岐</button>
        </div>
        <button onclick="addRail('double_crossover')" style="background:#00695C;">渡りポイント</button>

        <div class="divider"></div>
        <div class="category-label">▼ 操作・編集</div>
        <div class="flex-row">
            <button onclick="changeHeight(1)" style="background:#00BCD4;">1 ⬆️</button>
            <button onclick="changeHeight(0.25)" style="background:#26C6DA;">1/4 ⤴️</button>
            <button onclick="changeHeight(-0.25)" style="background:#4DD0E1;">1/4 ⤵️</button>
            <button onclick="changeHeight(-1)" style="background:#0097A7;">1 ⬇️</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(1)" style="background:#4CAF50;">↺ 左45°</button>
            <button onclick="rotate(-1)" style="background:#4CAF50;">右45° ↻</button>
        </div>
        <button onclick="flipCurve()" style="background:#9C27B0;">レール裏返し (左右反転) ⇄</button>
        <button onclick="flipGender()" style="background:#E91E63;">ジョイント(凸凹)入替</button>
        
        <div class="flex-row">
            <button onclick="toggleAutoAlign()" id="autoAlignBtn" style="background:#FF9800;">自動回転: ON</button>
            <button onclick="deleteRail()" style="background:#f44336;">選択削除</button>
        </div>
        
        <div class="divider"></div>
        <div class="flex-row">
            <button onclick="saveToBrowser()" style="background:#607D8B;">💾 保存</button>
            <button onclick="loadFromBrowser()" style="background:#607D8B;">📂 読込</button>
        </div>
        <div id="status"></div>
    </div>
    
    <div class="inst">
        ◆ L/R反転や高低差、スナップ機能を維持した修正版です。<br>
        ◆ 視点移動: 右クリック(2本指)ドラッグ
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, orbit;
        const rails = [];
        let selectedObject = null;
        let autoAlignEnabled = true;
        
        const L = 10, W = 1.8, SNAP_DIST = 2.5, OFFSET = 2.8, H_UNIT = 3.0; 

        const matNormal = new THREE.MeshPhongMaterial({ color: 0x0072bc });
        const matYellow = new THREE.MeshPhongMaterial({ color: 0xffd600 });
        const edgeMatNormal = new THREE.LineBasicMaterial({ color: 0x001133 });

        const p0 = [0, 0, 0, 0, 0, -1];
        const pS = [0, 0, L, 0, 0, 1];
        const pCL = [L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pCR = [-L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];

        const railPrefs = {
            'curve': 'curve_right', 'double_length_curve': 'double_length_curve_right',
            's_curve': 's_curve_L', 'turnout': 'turnout_L_out', 'fig8': 'fig8_F_RM',
            'y_point': 'y_point_F_RM', '3way': '3way_A', 'slope': 'slope_up',
            'double_curve': 'double_curve_right', 'outer_curve': 'outer_curve_right',
            'double_turnout': 'double_turnout_L', 'double_crossover': 'double_crossover_L',
            'double_point': 'double_point_L_out'
        };

        const railGroupMap = {
            'curve_right': 'curve', 'curve_left': 'curve',
            'double_length_curve_right': 'double_length_curve', 'double_length_curve_left': 'double_length_curve',
            's_curve_L': 's_curve', 's_curve_R': 's_curve', 's_curve_L_flip': 's_curve', 's_curve_R_flip': 's_curve',
            'turnout_L_out': 'turnout', 'turnout_R_out': 'turnout', 'turnout_L_in': 'turnout', 'turnout_R_in': 'turnout',
            'fig8_F_RM': 'fig8', 'fig8_F_LM': 'fig8', 'fig8_M_RM': 'fig8', 'fig8_M_LM': 'fig8',
            'y_point_F_RM': 'y_point', 'y_point_F_LM': 'y_point', 'y_point_M_RM': 'y_point', 'y_point_M_LM': 'y_point',
            '3way_A': '3way', '3way_B': '3way', '3way_A_flip': '3way', '3way_B_flip': '3way',
            'slope_up': 'slope', 'slope_down': 'slope', 'slope_up_flip': 'slope', 'slope_down_flip': 'slope',
            'double_curve_right': 'double_curve', 'double_curve_left': 'double_curve',
            'outer_curve_right': 'outer_curve', 'outer_curve_left': 'outer_curve',
            'double_turnout_L': 'double_turnout', 'double_turnout_R': 'double_turnout',
            'double_turnout_L_flip': 'double_turnout', 'double_turnout_R_flip': 'double_turnout',
            'double_crossover_L': 'double_crossover', 'double_crossover_R': 'double_crossover',
            'double_point_L_out': 'double_point', 'double_point_R_out': 'double_point',
            'double_point_L_in': 'double_point', 'double_point_R_in': 'double_point'
        };

        let pierGroup, pierGeo, pierEdges, pierEdgeMat, miniPierGeo, miniPierEdges;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(20, 40, 30);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.GridHelper(200, 40, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            pierGroup = new THREE.Group();
            scene.add(pierGroup);

            const pw = 1.7, ph = H_UNIT, th = 0.4, topTh = 0.5;
            const pShape = new THREE.Shape();
            pShape.moveTo(-pw, 0); pShape.lineTo(-pw, ph); pShape.lineTo(pw, ph); pShape.lineTo(pw, 0);
            pShape.lineTo(pw-th, 0); pShape.lineTo(pw-th, ph-topTh); pShape.lineTo(-pw+th, ph-topTh); pShape.lineTo(-pw+th, 0);
            pierGeo = new THREE.ExtrudeGeometry(pShape, { depth: 1.8, bevelEnabled: false });
            pierGeo.translate(0, 0, -0.9);
            pierEdges = new THREE.EdgesGeometry(pierGeo);
            pierEdgeMat = new THREE.LineBasicMaterial({ color: 0xb89a00 });

            const mph = H_UNIT / 4;
            const mPShape = new THREE.Shape();
            mPShape.moveTo(-pw, 0); mPShape.lineTo(-pw, mph); mPShape.lineTo(pw, mph); mPShape.lineTo(pw, 0);
            miniPierGeo = new THREE.ExtrudeGeometry(mPShape, { depth: 1.8, bevelEnabled: false });
            miniPierGeo.translate(0, 0, -0.9);
            miniPierEdges = new THREE.EdgesGeometry(miniPierGeo);

            orbit = new OrbitControls(camera, renderer.domElement);
            setupCustomDrag();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function setupCustomDrag() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let draggingRail = null, dragOffset = new THREE.Vector3();
            const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            renderer.domElement.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(rails, true).filter(h => !h.object.userData.ignoreRaycast);
                if (hits.length > 0) {
                    let obj = hits[0].object; while (obj && !rails.includes(obj)) obj = obj.parent;
                    if (obj) {
                        orbit.enabled = false; selectedObject = obj; draggingRail = obj; highlight(obj);
                        dragPlane.constant = -obj.position.y;
                        const hitPt = new THREE.Vector3();
                        if (raycaster.ray.intersectPlane(dragPlane, hitPt)) dragOffset.copy(hitPt).sub(obj.position);
                    }
                } else { selectedObject = null; highlight(null); }
            });

            renderer.domElement.addEventListener('pointermove', (e) => {
                if (draggingRail) {
                    mouse.x = (e.clientX/window.innerWidth)*2-1; mouse.y = -(e.clientY/window.innerHeight)*2+1;
                    raycaster.setFromCamera(mouse, camera);
                    const hitPt = new THREE.Vector3();
                    if (raycaster.ray.intersectPlane(dragPlane, hitPt)) {
                        draggingRail.position.copy(hitPt).sub(dragOffset);
                        checkSnap(draggingRail);
                    }
                }
            });

            renderer.domElement.addEventListener('pointerup', () => { 
                if (draggingRail) updatePiers();
                draggingRail = null; orbit.enabled = true; 
            });
        }

        function getJointData(rail) {
            rail.updateMatrixWorld();
            const joints = [], m = rail.matrixWorld, q = rail.quaternion, type = rail.userData.type;
            const addJ = (id, x, y, z, dx, dy, dz, gender, isSlopeTop = false) => {
                joints.push({ id, pos: new THREE.Vector3(x, y, z).applyMatrix4(m), dir: new THREE.Vector3(dx, dy, dz).applyQuaternion(q).normalize(), gender, isSlopeTop });
            };
            const H_Q = H_UNIT / 4;

            if (type === 'straight' || type === 'straight_flip') { addJ(0, ...p0, type==='straight'?'F':'M'); addJ(1, ...pS, type==='straight'?'M':'F'); }
            else if (type === 'double_length_straight') { addJ(0, ...p0, 'F'); addJ(1, 0, 0, 2*L, 0, 0, 1, 'M'); }
            else if (type === 'half_straight') { addJ(0, ...p0, 'F'); addJ(1, 0, 0, L/2, 0, 0, 1, 'M'); }
            else if (type.startsWith('quarter_')) { 
                let g1 = type.includes('FF')?'F':(type.includes('MM')?'M':'F'), g2 = type.includes('FF')?'F':(type.includes('MM')?'M':'M');
                addJ(0, ...p0, g1); addJ(1, 0, 0, L/4, 0, 0, 1, g2); 
            }
            else if (type === 'curve_left') { addJ(0, ...p0, 'F'); addJ(1, ...pCL, 'M'); }
            else if (type === 'curve_right') { addJ(0, ...p0, 'F'); addJ(1, ...pCR, 'M'); }
            else if (type === 'double_curve_left') {
                addJ(0, ...p0, 'F'); addJ(1, ...pCL, 'M');
                addJ(2, OFFSET, 0, 0, 0, 0, -1, 'F');
                addJ(3, (L-OFFSET)*(1-Math.cos(Math.PI/4))+OFFSET, 0, (L-OFFSET)*Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            else if (type === 'double_curve_right') {
                addJ(0, ...p0, 'F'); addJ(1, ...pCR, 'M');
                addJ(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJ(3, -(L-OFFSET)*(1-Math.cos(Math.PI/4))-OFFSET, 0, (L-OFFSET)*Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            else if (type === 'outer_curve_left') { addJ(0, ...p0, 'F'); addJ(1, (L+OFFSET)*(1-Math.cos(Math.PI/4)), 0, (L+OFFSET)*Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M'); }
            else if (type === 'outer_curve_right') { addJ(0, ...p0, 'F'); addJ(1, -(L+OFFSET)*(1-Math.cos(Math.PI/4)), 0, (L+OFFSET)*Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M'); }
            else if (type.startsWith('turnout_L')) { addJ(0, ...p0, type.endsWith('out')?'F':'M'); addJ(1, ...pS, type.endsWith('out')?'M':'F'); addJ(2, ...pCL, type.endsWith('out')?'M':'F'); }
            else if (type.startsWith('turnout_R')) { addJ(0, ...p0, type.endsWith('out')?'F':'M'); addJ(1, ...pS, type.endsWith('out')?'M':'F'); addJ(2, ...pCR, type.endsWith('out')?'M':'F'); }
            else if (type.startsWith('double_turnout_L')) {
                let g = type.includes('flip')?'M':'F', ig = type.includes('flip')?'F':'M';
                addJ(0, 0,0,0, 0,0,-1, g); addJ(1, 0,0,L, 0,0,1, ig); addJ(2, OFFSET,0,0, 0,0,-1, g); addJ(3, OFFSET,0,L, 0,0,1, ig);
                addJ(4, OFFSET+L, 0, L, 1, 0, 0, ig); addJ(5, OFFSET+L, 0, L+OFFSET, 1, 0, 0, ig);
            }
            else if (type.startsWith('double_turnout_R')) {
                let g = type.includes('flip')?'M':'F', ig = type.includes('flip')?'F':'M';
                addJ(0, 0,0,0, 0,0,-1, g); addJ(1, 0,0,L, 0,0,1, ig); addJ(2, -OFFSET,0,0, 0,0,-1, g); addJ(3, -OFFSET,0,L, 0,0,1, ig);
                addJ(4, -(OFFSET+L), 0, L, -1, 0, 0, ig); addJ(5, -(OFFSET+L), 0, L+OFFSET, -1, 0, 0, ig);
            }
            else if (type === 'double_straight') { addJ(0, ...p0, 'F'); addJ(1, ...pS, 'M'); addJ(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJ(3, -OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type.startsWith('slope_curve_A')) { addJ(0, ...p0, 'F'); addJ(1, pCL[0], H_Q, pCL[2], pCL[3], pCL[4], pCL[5], 'M', true); }
            else if (type.startsWith('slope_curve_B')) { addJ(0, ...p0, 'M'); addJ(1, pCR[0], H_Q, pCR[2], pCR[3], pCR[4], pCR[5], 'F', true); }
            else if (type.startsWith('slope')) {
                let isF = type.includes('flip');
                if (type.includes('up')) { addJ(0, 0,0,0, 0,0,-1, isF?'F':'M'); addJ(1, 0,H_UNIT,2*L, 0,0,1, isF?'M':'F'); }
                else { addJ(0, 0,H_UNIT,0, 0,0,-1, isF?'F':'M'); addJ(1, 0,0,2*L, 0,0,1, isF?'M':'F'); }
            }
            return joints;
        }

        function checkSnap(dragged) {
            dragged.updateMatrixWorld();
            let myJoints = getJointData(dragged);
            const occupied = [];
            rails.forEach(r => { if (r !== dragged) getJointData(r).forEach(j => occupied.push(j)); });

            if (autoAlignEnabled) {
                for (let mj of myJoints) {
                    for (let occ of occupied) {
                        if (mj.pos.distanceTo(occ.pos) < SNAP_DIST * 1.2 && mj.gender !== occ.gender) {
                            const targetAngle = Math.atan2(-occ.dir.x, -occ.dir.z);
                            const currentAngle = Math.atan2(mj.dir.x, mj.dir.z);
                            dragged.rotation.y += (targetAngle - currentAngle);
                            dragged.updateMatrixWorld();
                            myJoints = getJointData(dragged);
                            break;
                        }
                    }
                }
            }

            for (let mj of myJoints) {
                for (let occ of occupied) {
                    if (mj.pos.distanceTo(occ.pos) < SNAP_DIST && mj.dir.dot(occ.dir) < -0.9 && mj.gender !== occ.gender) {
                        dragged.position.add(new THREE.Vector3().subVectors(occ.pos, mj.pos));
                        return true;
                    }
                }
            }
            return false;
        }

        function updatePiers() {
            pierGroup.clear();
            const spots = [];
            rails.forEach(rail => {
                getJointData(rail).forEach(j => {
                    if (j.pos.y > 0.1) {
                        let found = spots.find(s => Math.hypot(s.x - j.pos.x, s.z - j.pos.z) < 0.5);
                        if (found) { found.maxY = Math.max(found.maxY, j.pos.y); }
                        else {
                            // 棒の向きを計算：dirが(dx, 0, dz)なら、棒の正面(Z)をdirに、側面(X)を枕木方向に。
                            const angle = Math.atan2(j.dir.x, j.dir.z);
                            spots.push({ x: j.pos.x, z: j.pos.z, maxY: j.pos.y, rotY: angle, hasSlopeTop: j.isSlopeTop });
                        }
                    }
                });
            });

            spots.forEach(spot => {
                let h = spot.maxY; if (spot.hasSlopeTop) h -= (H_UNIT/4);
                let currentY = 0;
                const qCount = Math.round(h / (H_UNIT/4));
                for (let i=0; i < Math.floor(qCount/4); i++) {
                    const m = new THREE.Mesh(pierGeo, matYellow); m.position.set(spot.x, currentY, spot.z); m.rotation.y = spot.rotY;
                    m.add(new THREE.LineSegments(pierEdges, pierEdgeMat)); pierGroup.add(m); currentY += H_UNIT;
                }
                for (let i=0; i < qCount%4; i++) {
                    const m = new THREE.Mesh(miniPierGeo, matYellow); m.position.set(spot.x, currentY, spot.z); m.rotation.y = spot.rotY;
                    m.add(new THREE.LineSegments(miniPierEdges, pierEdgeMat)); pierGroup.add(m); currentY += (H_UNIT/4);
                }
            });
        }

        function highlight(obj) {
            rails.forEach(r => r.traverse(c => { if (c.isMesh) c.material = (r === obj) ? new THREE.MeshPhongMaterial({ color: 0xff5252 }) : matNormal; }));
        }

        window.addRail = (group) => {
            const r = createRailObject(railPrefs[group] || group);
            scene.add(r); rails.push(r); selectedObject = r; highlight(r); updatePiers();
        };

        window.deleteRail = () => {
            if (!selectedObject) return;
            scene.remove(selectedObject); rails.splice(rails.indexOf(selectedObject), 1);
            selectedObject = null; updatePiers();
        };

        window.rotate = (s) => { if (selectedObject) { selectedObject.rotation.y += s * Math.PI/4; updatePiers(); } };
        
        window.changeHeight = (d) => {
            if (selectedObject) { selectedObject.position.y = Math.max(0, selectedObject.position.y + d * H_UNIT); updatePiers(); }
        };

        window.toggleAutoAlign = () => {
            autoAlignEnabled = !autoAlignEnabled;
            document.getElementById('autoAlignBtn').innerText = `自動回転: ${autoAlignEnabled?'ON':'OFF'}`;
        };

        function createRailObject(type) {
            const group = new THREE.Group(); group.userData.type = type;
            const addB = (x, z, len, ry=0) => {
                const m = new THREE.Mesh(new THREE.BoxGeometry(W, 0.4, len), matNormal);
                m.position.set(x, 0.2, z); m.rotation.y = ry;
                m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), edgeMatNormal));
                group.add(m);
            };
            const addCB = (rad, sA, eA, xO=0) => {
                const pts = []; for(let i=0; i<=12; i++) { const a = sA+(eA-sA)*(i/12); pts.push(new THREE.Vector3(Math.cos(a)*rad+xO, 0.2, Math.sin(a)*rad)); }
                const geo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts), 12, W/2, 8, false);
                const m = new THREE.Mesh(geo, matNormal); m.scale.set(1, 0.4, 1); group.add(m);
            };

            if (type.startsWith('straight')) addB(0, L/2, L);
            else if (type === 'double_length_straight') addB(0, L, 2*L);
            else if (type === 'half_straight') addB(0, L/4, L/2);
            else if (type.startsWith('quarter')) addB(0, L/8, L/4);
            else if (type === 'curve_left') addCB(L, Math.PI, 3*Math.PI/4, L);
            else if (type === 'curve_right') addCB(L, 0, -Math.PI/4, -L);
            else if (type === 'double_curve_left') { addCB(L, Math.PI, 3*Math.PI/4, L); addCB(L-OFFSET, Math.PI, 3*Math.PI/4, L); }
            else if (type === 'double_curve_right') { addCB(L, 0, -Math.PI/4, -L); addCB(L-OFFSET, 0, -Math.PI/4, -L); }
            else if (type === 'outer_curve_left') addCB(L+OFFSET, Math.PI, 3*Math.PI/4, L+OFFSET);
            else if (type === 'outer_curve_right') addCB(L+OFFSET, 0, -Math.PI/4, -(L+OFFSET));
            else if (type.startsWith('turnout_L')) { addB(0, L/2, L); addCB(L, Math.PI, 3*Math.PI/4, L); }
            else if (type.startsWith('turnout_R')) { addB(0, L/2, L); addCB(L, 0, -Math.PI/4, -L); }
            else if (type.startsWith('double_turnout_L')) { addB(0, L/2, L); addB(OFFSET, L/2, L); addB(OFFSET+L/2, L, L, Math.PI/2); addB(OFFSET+L/2, L+OFFSET, L, Math.PI/2); }
            else if (type.startsWith('double_turnout_R')) { addB(0, L/2, L); addB(-OFFSET, L/2, L); addB(-(OFFSET+L/2), L, L, Math.PI/2); addB(-(OFFSET+L/2), L+OFFSET, L, Math.PI/2); }
            else if (type === 'double_straight') { addB(0, L/2, L); addB(-OFFSET, L/2, L); }
            else if (type.startsWith('slope')) addB(0, L, 2*L);
            return group;
        }

        window.saveToBrowser = () => { localStorage.setItem('railSimSave', JSON.stringify(rails.map(r => ({ t: r.userData.type, p: r.position, r: r.rotation.y })))); };
        window.loadFromBrowser = () => {
            const data = JSON.parse(localStorage.getItem('railSimSave') || '[]');
            rails.forEach(r => scene.remove(r)); rails.length = 0;
            data.forEach(d => { const r = createRailObject(d.t); r.position.copy(d.p); r.rotation.y = d.r; scene.add(r); rails.push(r); });
            updatePiers();
        };

        function animate() { requestAnimationFrame(animate); orbit.update(); renderer.render(scene, camera); }
    </script>
</body>
</html>
