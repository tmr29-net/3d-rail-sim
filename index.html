<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Rail Sim - Final Perfection</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; touch-action: none; background: #1a1a1a; }
        #ui { position: absolute; top: 10px; left: 10px; display: flex; flex-wrap: wrap; gap: 5px; z-index: 10; width: 250px; max-height: 95vh; overflow-y: auto; padding-right: 5px; }
        #ui::-webkit-scrollbar { width: 6px; } #ui::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        button { padding: 8px; font-size: 11px; cursor: pointer; border: none; border-radius: 6px; background: #2196F3; color: white; font-weight: bold; width: 100%; transition: opacity 0.2s; box-sizing: border-box; }
        button:active { opacity: 0.7; }
        .inst { position: absolute; bottom: 10px; left: 10px; color: #ccc; font-size: 12px; pointer-events: none; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; line-height: 1.4;}
        #status { color: #ff5252; font-weight: bold; margin-top: 5px; min-height: 1.2em; text-shadow: 1px 1px 2px black; font-size: 12px; width: 100%; }
        .flex-row { display: flex; gap: 5px; width: 100%; }
        .flex-row button { flex: 1; padding: 8px 2px; }
        .divider { width: 100%; height: 1px; background: #444; margin: 3px 0; }
        .category-label { color: #ccc; font-size: 11px; width: 100%; margin-bottom: -2px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="category-label">▼ 基本レール群</div>
        <button onclick="addRail('straight')">直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_length_straight')">2倍直線</button>
            <button onclick="addRail('half_straight')" style="background:#42A5F5;">1/2直線</button>
            <button onclick="addRail('quarter_straight')" style="background:#64B5F6; color:#000;">1/4直線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('curve')">曲線</button>
            <button onclick="addRail('double_length_curve')">2倍曲線(90°)</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('s_curve')" style="background:#1E88E5;">S字カーブ</button>
            <button onclick="addRail('turnout')" style="background:#00BCD4;">ターンアウト</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('fig8')" style="background:#00ACC1;">8の字</button>
            <button onclick="addRail('y_point')" style="background:#0097A7;">Y字分岐</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('3way_A')" style="background:#8e24aa;">3分岐レール</button>
        </div>

        <div class="divider"></div>
        <div class="category-label">▼ 坂・高架レール群</div>
        <button onclick="addRail('slope')" style="background:#ffb300; color:#000;">直線坂</button>
        <div class="flex-row">
            <button onclick="addRail('slope_curve_A')" style="background:#FF9800; color:#000;">坂曲線A (下凹/左上)</button>
            <button onclick="addRail('slope_curve_B')" style="background:#FF9800; color:#000;">坂曲線B (下凸/右上)</button>
        </div>
        
        <div class="divider"></div>
        <div class="category-label">▼ 複線レール群</div>
        <button onclick="addRail('double_straight')">複線 直線レール</button>
        <div class="flex-row">
            <button onclick="addRail('double_curve')">複線 曲線</button>
            <button onclick="addRail('outer_curve')">複外 曲線</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('double_point')" style="background:#00897B;">単線・複線ポイント</button>
            <button onclick="addRail('double_turnout')" style="background:#00ACC1;">複線分岐</button>
        </div>
        <div class="flex-row">
            <button onclick="addRail('double_crossover')" style="background:#00695C;">渡りポイント</button>
        </div>

        <div class="divider"></div>
        <div class="category-label">▼ 操作・編集</div>
        <div class="flex-row">
            <button onclick="changeHeight(1)" style="background:#00BCD4;">1 ⬆️</button>
            <button onclick="changeHeight(0.25)" style="background:#26C6DA;">1/4 ⤴️</button>
            <button onclick="changeHeight(-0.25)" style="background:#4DD0E1;">1/4 ⤵️</button>
            <button onclick="changeHeight(-1)" style="background:#0097A7;">1 ⬇️</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(1)" style="background:#4CAF50;">↺ 左45°</button>
            <button onclick="rotate(-1)" style="background:#4CAF50;">右45° ↻</button>
        </div>
        <div class="flex-row">
            <button onclick="rotate(2)" style="background:#43A047;">↺ 左90°</button>
            <button onclick="rotate(4)" style="background:#388E3C;">180°反転</button>
            <button onclick="rotate(-2)" style="background:#43A047;">右90° ↻</button>
        </div>

        <button onclick="flipCurve()" style="background:#9C27B0;">レール裏返し (左右反転) ⇄</button>
        <button onclick="flipGender()" style="background:#E91E63;">ジョイント(凸凹)入替</button>
        
        <div class="flex-row">
            <button onclick="toggleAutoAlign()" id="autoAlignBtn" style="background:#FF9800;">自動回転: ON</button>
            <button onclick="deleteRail()" style="background:#f44336;">選択削除</button>
        </div>
        
        <div class="divider"></div>

        <div class="flex-row">
            <button onclick="saveToBrowser()" style="background:#607D8B;">💾 保存</button>
            <button onclick="loadFromBrowser()" style="background:#607D8B;">📂 読込</button>
        </div>
        <div class="flex-row">
            <button onclick="exportJSON()" style="background:#795548;">📤 書出</button>
            <button onclick="document.getElementById('fileInput').click()" style="background:#795548;">📥 読込</button>
        </div>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="importJSON(event)">

        <div id="status"></div>
    </div>
    
    <div class="inst">
        ◆ L/Rや上り下りボタンは統合されています。「反転」を使うと最後に使った向きを記憶します。<br>
        ◆ すべてのジョイントの凹凸が合わないとスナップしません。<br>
        ◆ 視点移動: 右クリック(2本指)ドラッグ
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, orbit;
        const rails = [];
        let selectedObject = null;
        let autoAlignEnabled = true;
        
        const L = 10; 
        const W = 1.8;
        const SNAP_DIST = 2.5; 
        const OFFSET = 2.8;
        const H_UNIT = 3.0; 

        const matNormal = new THREE.MeshPhongMaterial({ color: 0x0072bc });
        const matYellow = new THREE.MeshPhongMaterial({ color: 0xffd600 });
        const edgeMatNormal = new THREE.LineBasicMaterial({ color: 0x001133 });

        const p0 = [0, 0, 0, 0, 0, -1];
        const pS = [0, 0, L, 0, 0, 1];
        
        const pCL = [L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pCR = [-L * (1 - Math.cos(Math.PI/4)), 0, L * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pOCL = [(L+OFFSET) * (1 - Math.cos(Math.PI/4)), 0, (L+OFFSET) * Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];
        const pOCR = [-(L+OFFSET) * (1 - Math.cos(Math.PI/4)), 0, (L+OFFSET) * Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4)];

        const railPrefs = {
            'curve': 'curve_right',
            'double_length_curve': 'double_length_curve_right',
            's_curve': 's_curve_L',
            'turnout': 'turnout_L_out',
            'fig8': 'fig8_F_RM',
            'y_point': 'y_point_F_RM',
            '3way': '3way_A',
            'slope': 'slope_up',
            'double_curve': 'double_curve_right',
            'outer_curve': 'outer_curve_right',
            'double_turnout': 'double_turnout_L',
            'double_crossover': 'double_crossover_L',
            'double_point': 'double_point_L_out'
        };

        const railGroupMap = {
            'curve_right': 'curve', 'curve_left': 'curve',
            'double_length_curve_right': 'double_length_curve', 'double_length_curve_left': 'double_length_curve',
            's_curve_L': 's_curve', 's_curve_R': 's_curve',
            's_curve_L_flip': 's_curve', 's_curve_R_flip': 's_curve',
            'turnout_L_out': 'turnout', 'turnout_R_out': 'turnout',
            'turnout_L_in': 'turnout', 'turnout_R_in': 'turnout',
            'fig8_F_RM': 'fig8', 'fig8_F_LM': 'fig8', 'fig8_M_RM': 'fig8', 'fig8_M_LM': 'fig8',
            'y_point_F_RM': 'y_point', 'y_point_F_LM': 'y_point', 'y_point_M_RM': 'y_point', 'y_point_M_LM': 'y_point',
            '3way_A': '3way', '3way_B': '3way', '3way_A_flip': '3way', '3way_B_flip': '3way',
            'slope_up': 'slope', 'slope_down': 'slope', 'slope_up_flip': 'slope', 'slope_down_flip': 'slope',
            'double_curve_right': 'double_curve', 'double_curve_left': 'double_curve',
            'outer_curve_right': 'outer_curve', 'outer_curve_left': 'outer_curve',
            'double_turnout_L': 'double_turnout', 'double_turnout_R': 'double_turnout',
            'double_turnout_L_flip': 'double_turnout', 'double_turnout_R_flip': 'double_turnout',
            'double_crossover_L': 'double_crossover', 'double_crossover_R': 'double_crossover',
            'double_point_L_out': 'double_point', 'double_point_R_out': 'double_point',
            'double_point_L_in': 'double_point', 'double_point_R_in': 'double_point'
        };

        let pierGroup;
        let pierGeo, pierEdges, pierEdgeMat;
        let miniPierGeo, miniPierEdges;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(20, 40, 30);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.GridHelper(200, 40, 0x333333, 0x222222));
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            pierGroup = new THREE.Group();
            scene.add(pierGroup);

            const pierShape = new THREE.Shape();
            const pw = 1.7, ph = H_UNIT, th = 0.4, topTh = 0.5; 
            pierShape.moveTo(-pw, 0); pierShape.lineTo(-pw, ph); pierShape.lineTo(pw, ph);
            pierShape.lineTo(pw, 0);
            pierShape.lineTo(pw - th, 0); pierShape.lineTo(pw - th, ph - topTh); pierShape.lineTo(-pw + th, ph - topTh);
            pierShape.lineTo(-pw + th, 0);
            pierShape.closePath();
            pierGeo = new THREE.ExtrudeGeometry(pierShape, { depth: 1.8, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 });
            pierGeo.translate(0, 0, -0.9);
            pierEdges = new THREE.EdgesGeometry(pierGeo, 15);
            pierEdgeMat = new THREE.LineBasicMaterial({ color: 0xb89a00 });

            const miniPierShape = new THREE.Shape();
            const mph = H_UNIT / 4;
            miniPierShape.moveTo(-pw, 0); miniPierShape.lineTo(-pw, mph); miniPierShape.lineTo(pw, mph); miniPierShape.lineTo(pw, 0);
            miniPierShape.closePath();
            miniPierGeo = new THREE.ExtrudeGeometry(miniPierShape, { depth: 1.8, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.05, bevelThickness: 0.05 });
            miniPierGeo.translate(0, 0, -0.9);
            miniPierEdges = new THREE.EdgesGeometry(miniPierGeo, 15);

            orbit = new OrbitControls(camera, renderer.domElement);
            orbit.enableDamping = true; 
            setupCustomDrag();
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function setupCustomDrag() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            let draggingRail = null;
            let dragOffset = new THREE.Vector3();
            const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            renderer.domElement.addEventListener('pointerdown', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const validHits = raycaster.intersectObjects(rails, true).filter(h => h.object.type === 'Mesh' && !h.object.userData.ignoreRaycast);
            
                if (validHits.length > 0) {
                    let obj = validHits[0].object;
                    while (obj && !rails.includes(obj)) obj = obj.parent;
                    if (obj) {
                        orbit.enabled = false; selectedObject = obj; draggingRail = obj; highlight(obj);
                        const planeY = obj.position.y;
                        dragPlane.constant = -planeY;
                        obj.userData.baseY = planeY;
                        obj.userData.baseRotation = obj.rotation.y; 
                        
                        const hitPt = new THREE.Vector3();
                        if (raycaster.ray.intersectPlane(dragPlane, hitPt)) dragOffset.copy(hitPt).sub(obj.position);
                        renderer.domElement.setPointerCapture(e.pointerId);
                    }
                } else { selectedObject = null; highlight(null); }
            });

            renderer.domElement.addEventListener('pointermove', (e) => {
                if (draggingRail) {
                    mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const hitPt = new THREE.Vector3();
                    if (raycaster.ray.intersectPlane(dragPlane, hitPt)) {
                        const oldRot = draggingRail.rotation.y;
                        draggingRail.position.copy(hitPt).sub(dragOffset); 
                        draggingRail.position.y = draggingRail.userData.baseY; 
                        
                        const snapped = checkSnap(draggingRail, false);
                        
                        if (!snapped && draggingRail.rotation.y !== oldRot) {
                            const diff = draggingRail.rotation.y - oldRot;
                            dragOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), diff);
                            draggingRail.position.copy(hitPt).sub(dragOffset);
                            draggingRail.position.y = draggingRail.userData.baseY;
                            draggingRail.updateMatrixWorld();
                        }
                    }
                }
            });

            renderer.domElement.addEventListener('pointerup', (e) => { 
                if (draggingRail) { renderer.domElement.releasePointerCapture(e.pointerId); updatePiers(); }
                draggingRail = null; orbit.enabled = true; 
            });
        }

        window.toggleAutoAlign = () => {
            autoAlignEnabled = !autoAlignEnabled;
            const btn = document.getElementById('autoAlignBtn');
            btn.innerText = `自動回転: ${autoAlignEnabled ? 'ON' : 'OFF'}`;
            btn.style.background = autoAlignEnabled ? '#FF9800' : '#757575';
        };

        window.changeHeight = (delta) => {
            if (!selectedObject) return showMessage("レールを選択してください。");
            if (isConnected(selectedObject)) return showMessage("接続中は高さを変更できません。");
            
            selectedObject.position.y += delta * H_UNIT;
            if (selectedObject.position.y < 0) selectedObject.position.y = 0;
            
            selectedObject.userData.baseY = selectedObject.position.y;
            checkSnap(selectedObject, true); 
            updatePiers();
        };

        function updatePiers() {
            pierGroup.clear();
            const spots = [];

            rails.forEach(rail => {
                const joints = getJointData(rail);
                joints.forEach(j => {
                    const qLevel = Math.round(j.pos.y / (H_UNIT / 4));
                    if (qLevel > 0) {
                        let found = spots.find(s => Math.hypot(s.x - j.pos.x, s.z - j.pos.z) < 0.5);
                        if (found) {
                            found.maxY = Math.max(found.maxY, j.pos.y);
                            if (j.isSlopeTop) found.hasSlopeTop = true;
                        } else {
                            // 修正箇所：棒の向き（rotY）をレール進行方向(j.dir)からatan2を用いて算出し、枕木と平行になるように合わせる
                            let rotY = Math.atan2(j.dir.x, j.dir.z); 
                            spots.push({ x: j.pos.x, z: j.pos.z, maxY: j.pos.y, rotY, hasSlopeTop: j.isSlopeTop });
                        }
                    }
                });
            });

            spots.forEach(spot => {
                let maxLevel = Math.round(spot.maxY / (H_UNIT / 4));
                if (spot.hasSlopeTop) maxLevel -= 1;
                if (maxLevel <= 0) return;

                const numQuarter = maxLevel % 4; 
                const numFull = Math.floor(maxLevel / 4); 
                let currentY = 0;
                
                for (let i = 0; i < numQuarter; i++) {
                    const mesh = new THREE.Mesh(miniPierGeo, matYellow);
                    mesh.position.set(spot.x, currentY, spot.z);
                    mesh.rotation.y = spot.rotY;
                    const edges = new THREE.LineSegments(miniPierEdges, pierEdgeMat);
                    mesh.add(edges);
                    pierGroup.add(mesh);
                    currentY += (H_UNIT / 4);
                }
                
                for (let i = 0; i < numFull; i++) {
                    const mesh = new THREE.Mesh(pierGeo, matYellow);
                    mesh.position.set(spot.x, currentY, spot.z);
                    mesh.rotation.y = spot.rotY;
                    const edges = new THREE.LineSegments(pierEdges, pierEdgeMat);
                    mesh.add(edges);
                    pierGroup.add(mesh);
                    currentY += H_UNIT;
                }
            });
        }

        function getJointData(rail) {
            rail.updateMatrixWorld();
            const joints = [], m = rail.matrixWorld, q = rail.quaternion, type = rail.userData.type;
            const addJoint = (id, x, y, z, dx, dy, dz, gender, isSlopeTop = false) => {
                joints.push({ id, pos: new THREE.Vector3(x, y, z).applyMatrix4(m), dir: new THREE.Vector3(dx, dy, dz).applyQuaternion(q).normalize(), gender, isSlopeTop });
            };
            const H_Q = H_UNIT / 4;

            if (type === 'straight') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); }
            else if (type === 'double_length_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, 2*L, 0, 0, 1, 'M'); }
            else if (type === 'half_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/2, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight_MM') { addJoint(0, ...p0, 'M'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'M'); }
            else if (type === 'quarter_straight_FF') { addJoint(0, ...p0, 'F'); addJoint(1, 0, 0, L/4, 0, 0, 1, 'F'); }
            
            else if (type === 'double_length_curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, L, 0, L, 1, 0, 0, 'M'); }
            else if (type === 'double_length_curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, -L, 0, L, -1, 0, 0, 'M'); }

            else if (type === 's_curve_L') { addJoint(0, ...p0, 'F'); addJoint(1, OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 's_curve_R') { addJoint(0, ...p0, 'F'); addJoint(1, -OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 's_curve_L_flip') { addJoint(0, ...p0, 'M'); addJoint(1, OFFSET, 0, L, 0, 0, 1, 'F'); }
            else if (type === 's_curve_R_flip') { addJoint(0, ...p0, 'M'); addJoint(1, -OFFSET, 0, L, 0, 0, 1, 'F'); }

            else if (type === 'slope_up') { addJoint(0, 0,0,0, 0,0,-1, 'M'); addJoint(1, 0,H_UNIT,2*L, 0,0,1, 'F'); }
            else if (type === 'slope_down') { addJoint(0, 0,H_UNIT,0, 0,0,-1, 'M'); addJoint(1, 0,0,2*L, 0,0,1, 'F'); }
            else if (type === 'slope_up_flip') { addJoint(0, 0,0,0, 0,0,-1, 'F'); addJoint(1, 0,H_UNIT,2*L, 0,0,1, 'M'); }
            else if (type === 'slope_down_flip') { addJoint(0, 0,H_UNIT,0, 0,0,-1, 'F'); addJoint(1, 0,0,2*L, 0,0,1, 'M'); }

            else if (type === 'slope_curve_A') { addJoint(0, ...p0, 'F'); addJoint(1, pCL[0], H_Q, pCL[2], pCL[3], pCL[4], pCL[5], 'M', true); }
            else if (type === 'slope_curve_B') { addJoint(0, ...p0, 'M'); addJoint(1, pCR[0], H_Q, pCR[2], pCR[3], pCR[4], pCR[5], 'F', true); }

            else if (type === 'curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCL, 'M'); }
            else if (type === 'curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'M'); }
            else if (type === 'outer_curve_left') { addJoint(0, ...p0, 'F'); addJoint(1, ...pOCL, 'M'); }
            else if (type === 'outer_curve_right') { addJoint(0, ...p0, 'F'); addJoint(1, ...pOCR, 'M'); }
            
            else if (type === '3way_A') { addJoint(0, ...p0, 'M'); addJoint(1, ...pS, 'F'); addJoint(2, ...pCL, 'M'); addJoint(3, ...pCR, 'F'); }
            else if (type === '3way_B') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'F'); addJoint(3, ...pCR, 'M'); }
            else if (type === '3way_A_flip') { addJoint(0, ...p0, 'M'); addJoint(1, ...pS, 'F'); addJoint(2, ...pCL, 'F'); addJoint(3, ...pCR, 'M'); }
            else if (type === '3way_B_flip') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'M'); addJoint(3, ...pCR, 'F'); }
            
            else if (type === 'double_straight' || type.startsWith('double_crossover_')) {
                addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
            }
            
            // 修正箇所：複線曲線レールの寸法（左右で正確に対称になるようにLとOFFSETの計算式を修正）
            else if (type === 'double_curve_left') {
                addJoint(0, ...p0, 'F');
                addJoint(1, ...pCL, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, -OFFSET + (L+OFFSET)*(1-Math.cos(Math.PI/4)), 0, (L+OFFSET)*Math.sin(Math.PI/4), Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            else if (type === 'double_curve_right') {
                addJoint(0, ...p0, 'F');
                addJoint(1, ...pCR, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F');
                addJoint(3, -OFFSET - (L-OFFSET)*(1-Math.cos(Math.PI/4)), 0, (L-OFFSET)*Math.sin(Math.PI/4), -Math.sin(Math.PI/4), 0, Math.cos(Math.PI/4), 'M');
            }
            
            // 修正箇所：複線ターンアウトレールの寸法（左右で全く同じ構造・間隔になるよう座標を完全対称化）
            else if (type === 'double_turnout_L') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'F'); addJoint(1, 0, 0, L, 0, 0, 1, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
                addJoint(4, L, 0, L, 1, 0, 0, 'M'); addJoint(5, L, 0, L+OFFSET, 1, 0, 0, 'M');
            }
            else if (type === 'double_turnout_R') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'F'); addJoint(1, 0, 0, L, 0, 0, 1, 'M');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'F'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'M');
                addJoint(4, -L, 0, L, -1, 0, 0, 'M'); addJoint(5, -L, 0, L+OFFSET, -1, 0, 0, 'M');
            }
            else if (type === 'double_turnout_L_flip') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'M'); addJoint(1, 0, 0, L, 0, 0, 1, 'F');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'M'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'F');
                addJoint(4, L, 0, L, 1, 0, 0, 'F'); addJoint(5, L, 0, L+OFFSET, 1, 0, 0, 'F');
            }
            else if (type === 'double_turnout_R_flip') {
                addJoint(0, 0, 0, 0, 0, 0, -1, 'M'); addJoint(1, 0, 0, L, 0, 0, 1, 'F');
                addJoint(2, -OFFSET, 0, 0, 0, 0, -1, 'M'); addJoint(3, -OFFSET, 0, L, 0, 0, 1, 'F');
                addJoint(4, -L, 0, L, -1, 0, 0, 'F'); addJoint(5, -L, 0, L+OFFSET, -1, 0, 0, 'F');
            }
            
            else if (type === 'turnout_L_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'turnout_R_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, ...pCR, 'M'); }
            else if (type === 'turnout_L_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'turnout_R_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, ...pCR, 'F'); }
            else if (type === 'fig8_F_RM') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'M'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'fig8_M_RM') { addJoint(0, ...p0, 'M'); addJoint(1, ...pCR, 'M'); addJoint(2, ...pCL, 'F'); }
            else if (type === 'fig8_F_LM') { addJoint(0, ...p0, 'F'); addJoint(1, ...pCR, 'F'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'fig8_M_LM') { addJoint(0, ...p0, 'M'); addJoint(1, ...pCR, 'F'); addJoint(2, ...pCL, 'M'); }
            else if (type === 'y_point_F_RM') { addJoint(0, ...p0, 'F'); addJoint(1, -2.5, 0, L, 0, 0, 1, 'M'); addJoint(2, 2.5, 0, L, 0, 0, 1, 'F'); }
            else if (type === 'y_point_M_RM') { addJoint(0, ...p0, 'M'); addJoint(1, -2.5, 0, L, 0, 0, 1, 'M'); addJoint(2, 2.5, 0, L, 0, 0, 1, 'F'); }
            else if (type === 'y_point_F_LM') { addJoint(0, ...p0, 'F'); addJoint(1, -2.5, 0, L, 0, 0, 1, 'F'); addJoint(2, 2.5, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'y_point_M_LM') { addJoint(0, ...p0, 'M'); addJoint(1, -2.5, 0, L, 0, 0, 1, 'F'); addJoint(2, 2.5, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'double_point_L_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'double_point_R_out') { addJoint(0, ...p0, 'F'); addJoint(1, ...pS, 'M'); addJoint(2, -OFFSET, 0, L, 0, 0, 1, 'M'); }
            else if (type === 'double_point_L_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, OFFSET, 0, L, 0, 0, 1, 'F'); }
            else if (type === 'double_point_R_in') { addJoint(1, ...p0, 'M'); addJoint(0, ...pS, 'F'); addJoint(2, -OFFSET, 0, L, 0, 0, 1, 'F'); }
            return joints;
        }

        function checkSnap(dragged, skipAutoAlign = false) {
            const originalPos = dragged.position.clone();
            dragged.updateMatrixWorld();
            let myJoints = getJointData(dragged);
            const occupied = [];
            rails.forEach(r => { if (r !== dragged) getJointData(r).forEach(j => occupied.push({ rail: r, pos: j.pos, dir: j.dir, gender: j.gender })); });

            const type = dragged.userData.type;
            const isBranch = type.includes('turnout') || type.includes('point') || type.includes('fig8') || type.includes('3way') || type.startsWith('double_crossover_');

            if (autoAlignEnabled && !isBranch && !skipAutoAlign) {
                let aligned = false;
                for (let mj of myJoints) {
                    for (let occ of occupied) {
                        if (mj.pos.distanceTo(occ.pos) < SNAP_DIST * 1.1 && mj.gender !== occ.gender) {
                            const overlapping = occupied.filter(o => occ.pos.distanceTo(o.pos) < 0.1);
                            if (overlapping.length >= 2) continue;
                            const targetAngle = Math.atan2(-occ.dir.x, -occ.dir.z);
                            const currentAngle = Math.atan2(mj.dir.x, mj.dir.z);
                            let diff = targetAngle - currentAngle;
                            diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                            dragged.rotation.y += diff;
                            dragged.updateMatrixWorld();
                            myJoints = getJointData(dragged);
                            aligned = true;
                            break;
                        }
                    }
                    if (aligned) break;
                }
                if (!aligned && dragged.userData.baseRotation !== undefined) {
                    dragged.rotation.y = dragged.userData.baseRotation;
                    dragged.updateMatrixWorld();
                    myJoints = getJointData(dragged);
                }
            }

            for (let mj of myJoints) {
                for (let occ of occupied) {
                    if (mj.pos.distanceTo(occ.pos) < SNAP_DIST && mj.dir.dot(occ.dir) < -0.9 && mj.gender !== occ.gender) {
                        const overlapping = occupied.filter(o => occ.pos.distanceTo(o.pos) < 0.1);
                        if (overlapping.length >= 2) continue;
                        const tempPos = dragged.position.clone().add(new THREE.Vector3().subVectors(occ.pos, mj.pos));
                        dragged.position.copy(tempPos);
                        dragged.updateMatrixWorld();
                        return true;
                    }
                }
            }
            return false;
        }

        function isConnected(rail) {
            const myJoints = getJointData(rail);
            const otherJoints = [];
            rails.forEach(r => { if (r !== rail) getJointData(r).forEach(j => otherJoints.push(j.pos)); });
            return myJoints.some(mj => otherJoints.some(oj => mj.pos.distanceTo(oj) < 0.1));
        }

        function highlight(obj) {
            rails.forEach(r => {
                r.traverse(child => {
                    if (child.isMesh && !child.userData.ignoreRaycast) {
                        child.material = (r === obj) ? new THREE.MeshPhongMaterial({ color: 0xff5252 }) : matNormal;
                    }
                });
            });
        }

        function showMessage(msg) {
            const st = document.getElementById('status');
            st.innerText = msg;
            setTimeout(() => { if (st.innerText === msg) st.innerText = ""; }, 3000);
        }

        window.addRail = (group) => {
            const type = railPrefs[group] || group;
            const r = createRailObject(type);
            r.position.set(0, 0, 0);
            scene.add(r);
            rails.push(r);
            selectedObject = r;
            highlight(r);
            updatePiers();
        };

        window.deleteRail = () => {
            if (!selectedObject) return showMessage("削除するレールを選択してください。");
            scene.remove(selectedObject);
            const idx = rails.indexOf(selectedObject);
            if (idx > -1) rails.splice(idx, 1);
            selectedObject = null;
            updatePiers();
        };

        window.rotate = (steps) => {
            if (!selectedObject) return showMessage("レールを選択してください。");
            selectedObject.rotation.y += steps * Math.PI / 4;
            updatePiers();
        };

        window.flipCurve = () => {
            if (!selectedObject) return showMessage("レールを選択してください。");
            const type = selectedObject.userData.type;
            const group = railGroupMap[type];
            if (!group) return;

            let nextType = type;
            if (group === 'curve') nextType = (type === 'curve_right' ? 'curve_left' : 'curve_right');
            else if (group === 'double_length_curve') nextType = (type === 'double_length_curve_right' ? 'double_length_curve_left' : 'double_length_curve_right');
            else if (group === 's_curve') nextType = { 's_curve_L': 's_curve_R', 's_curve_R': 's_curve_L', 's_curve_L_flip': 's_curve_R_flip', 's_curve_R_flip': 's_curve_L_flip' }[type];
            else if (group === 'turnout') nextType = { 'turnout_L_out': 'turnout_R_out', 'turnout_R_out': 'turnout_L_out', 'turnout_L_in': 'turnout_R_in', 'turnout_R_in': 'turnout_L_in' }[type];
            else if (group === 'fig8') nextType = { 'fig8_F_RM': 'fig8_F_LM', 'fig8_F_LM': 'fig8_F_RM', 'fig8_M_RM': 'fig8_M_LM', 'fig8_M_LM': 'fig8_M_RM' }[type];
            else if (group === 'y_point') nextType = { 'y_point_F_RM': 'y_point_F_LM', 'y_point_F_LM': 'y_point_F_RM', 'y_point_M_RM': 'y_point_M_LM', 'y_point_M_LM': 'y_point_M_RM' }[type];
            else if (group === '3way') nextType = { '3way_A': '3way_B', '3way_B': '3way_A', '3way_A_flip': '3way_B_flip', '3way_B_flip': '3way_A_flip' }[type];
            else if (group === 'slope') nextType = { 'slope_up': 'slope_down', 'slope_down': 'slope_up', 'slope_up_flip': 'slope_down_flip', 'slope_down_flip': 'slope_up_flip' }[type];
            else if (group === 'double_curve') nextType = (type === 'double_curve_right' ? 'double_curve_left' : 'double_curve_right');
            else if (group === 'outer_curve') nextType = (type === 'outer_curve_right' ? 'outer_curve_left' : 'outer_curve_right');
            else if (group === 'double_turnout') nextType = { 'double_turnout_L': 'double_turnout_R', 'double_turnout_R': 'double_turnout_L', 'double_turnout_L_flip': 'double_turnout_R_flip', 'double_turnout_R_flip': 'double_turnout_L_flip' }[type];
            else if (group === 'double_crossover') nextType = (type === 'double_crossover_L' ? 'double_crossover_R' : 'double_crossover_L');
            else if (group === 'double_point') nextType = { 'double_point_L_out': 'double_point_R_out', 'double_point_R_out': 'double_point_L_out', 'double_point_L_in': 'double_point_R_in', 'double_point_R_in': 'double_point_L_in' }[type];

            if (nextType !== type) {
                const newObj = createRailObject(nextType);
                newObj.position.copy(selectedObject.position);
                newObj.rotation.copy(selectedObject.rotation);
                scene.remove(selectedObject);
                rails[rails.indexOf(selectedObject)] = newObj;
                scene.add(newObj);
                selectedObject = newObj;
                highlight(newObj);
                railPrefs[group] = nextType;
                updatePiers();
            }
        };

        window.flipGender = () => {
            if (!selectedObject) return showMessage("レールを選択してください。");
            const type = selectedObject.userData.type;
            const group = railGroupMap[type];
            let nextType = type;
            if (type === 'straight') nextType = 'straight_flip';
            else if (type === 'straight_flip') nextType = 'straight';
            else if (type === 'quarter_straight') nextType = 'quarter_straight_MM';
            else if (type === 'quarter_straight_MM') nextType = 'quarter_straight_FF';
            else if (type === 'quarter_straight_FF') nextType = 'quarter_straight';
            else if (group === 's_curve') nextType = (type.includes('flip') ? type.replace('_flip', '') : type + '_flip');
            else if (group === 'turnout') nextType = (type.includes('out') ? type.replace('out', 'in') : type.replace('in', 'out'));
            else if (group === 'fig8') nextType = (type.includes('_F_') ? type.replace('_F_', '_M_') : type.replace('_M_', '_F_'));
            else if (group === 'y_point') nextType = (type.includes('_F_') ? type.replace('_F_', '_M_') : type.replace('_M_', '_F_'));
            else if (group === '3way') nextType = (type.includes('flip') ? type.replace('_flip', '') : type + '_flip');
            else if (group === 'slope') nextType = (type.includes('flip') ? type.replace('_flip', '') : type + '_flip');
            else if (group === 'double_turnout') nextType = (type.includes('flip') ? type.replace('_flip', '') : type + '_flip');
            else if (group === 'double_point') nextType = (type.includes('out') ? type.replace('out', 'in') : type.replace('in', 'out'));

            if (nextType !== type) {
                const newObj = createRailObject(nextType);
                newObj.position.copy(selectedObject.position);
                newObj.rotation.copy(selectedObject.rotation);
                scene.remove(selectedObject);
                rails[rails.indexOf(selectedObject)] = newObj;
                scene.add(newObj);
                selectedObject = newObj;
                highlight(newObj);
                updatePiers();
            }
        };

        function createRailObject(type) {
            const group = new THREE.Group();
            group.userData.type = type;

            const addBeam = (x, z, length, rotY = 0) => {
                const g = new THREE.BoxGeometry(W, 0.4, length);
                const m = new THREE.Mesh(matNormal, g);
                m.position.set(x, 0.2, z);
                m.rotation.y = rotY;
                group.add(m);
                const eg = new THREE.EdgesGeometry(g);
                const line = new THREE.LineSegments(eg, edgeMatNormal);
                m.add(line);
            };

            const addCurveBeam = (radius, startAngle, endAngle, xOff = 0) => {
                const pts = [];
                const segs = 12;
                for (let i = 0; i <= segs; i++) {
                    const a = startAngle + (endAngle - startAngle) * (i / segs);
                    pts.push(new THREE.Vector2(Math.cos(a) * radius, Math.sin(a) * radius));
                }
                const shape = new THREE.Shape();
                shape.moveTo(pts[0].x - W/2, pts[0].y);
                const extrudeSettings = { steps: segs, depth: 0.4, bevelEnabled: false };
                const curvePath = new THREE.CurvePath();
                const points3d = pts.map(p => new THREE.Vector3(p.x + xOff, 0, p.y));
                const curve = new THREE.CatmullRomCurve3(points3d);
                const geo = new THREE.TubeGeometry(curve, segs, W/2, 8, false);
                const mesh = new THREE.Mesh(matNormal, geo);
                mesh.position.y = 0.2;
                mesh.scale.set(1, 0.4, 1);
                group.add(mesh);
            };

            if (type.startsWith('straight') || type === 'straight_flip') { addBeam(0, L/2, L); }
            else if (type === 'double_length_straight') { addBeam(0, L, 2*L); }
            else if (type === 'half_straight') { addBeam(0, L/4, L/2); }
            else if (type.startsWith('quarter_straight')) { addBeam(0, L/8, L/4); }
            else if (type === 'curve_left') { addCurveBeam(L, Math.PI, 3*Math.PI/4, L); }
            else if (type === 'curve_right') { addCurveBeam(L, 0, -Math.PI/4, -L); }
            else if (type === 'double_length_curve_left') { addCurveBeam(L, Math.PI, Math.PI/2, L); }
            else if (type === 'double_length_curve_right') { addCurveBeam(L, 0, Math.PI/2, -L); }
            else if (type === 's_curve_L' || type === 's_curve_L_flip') { addCurveBeam(L, Math.PI, Math.PI-0.3, L); addCurveBeam(L, -0.3, 0, -L+OFFSET); }
            else if (type === 's_curve_R' || type === 's_curve_R_flip') { addCurveBeam(L, 0, 0.3, -L); addCurveBeam(L, Math.PI+0.3, Math.PI, L-OFFSET); }
            else if (type.startsWith('turnout_L')) { addBeam(0, L/2, L); addCurveBeam(L, Math.PI, 3*Math.PI/4, L); }
            else if (type.startsWith('turnout_R')) { addBeam(0, L/2, L); addCurveBeam(L, 0, -Math.PI/4, -L); }
            else if (type.startsWith('fig8')) { addCurveBeam(L, 0, -Math.PI/4, -L); addCurveBeam(L, Math.PI, 3*Math.PI/4, L); }
            else if (type.startsWith('y_point')) { addBeam(-1.25, L/2, L, -0.1); addBeam(1.25, L/2, L, 0.1); }
            else if (type.startsWith('3way')) { addBeam(0, L/2, L); addCurveBeam(L, Math.PI, 3*Math.PI/4, L); addCurveBeam(L, 0, -Math.PI/4, -L); }
            else if (type.startsWith('slope_curve')) { addCurveBeam(L, Math.PI, 3*Math.PI/4, L); }
            else if (type.startsWith('slope')) { addBeam(0, L, 2*L); }
            else if (type === 'double_straight' || type.startsWith('double_crossover')) { addBeam(0, L/2, L); addBeam(-OFFSET, L/2, L); if (type.includes('crossover')) addBeam(-OFFSET/2, L/2, L*0.8, (type.includes('L')?1:-1)*0.5); }
            else if (type === 'double_curve_left') { addCurveBeam(L, Math.PI, 3*Math.PI/4, L); addCurveBeam(L+OFFSET, Math.PI, 3*Math.PI/4, L); }
            else if (type === 'double_curve_right') { addCurveBeam(L, 0, -Math.PI/4, -L); addCurveBeam(L-OFFSET, 0, -Math.PI/4, -L); }
            else if (type === 'outer_curve_left') { addCurveBeam(L+OFFSET, Math.PI, 3*Math.PI/4, L+OFFSET); }
            else if (type === 'outer_curve_right') { addCurveBeam(L+OFFSET, 0, -Math.PI/4, -(L+OFFSET)); }
            else if (type.startsWith('double_turnout_L')) { addBeam(0, L/2, L); addBeam(-OFFSET, L/2, L); addBeam(L/2, L, L, Math.PI/2); addBeam(L/2, L+OFFSET, L, Math.PI/2); }
            else if (type.startsWith('double_turnout_R')) { addBeam(0, L/2, L); addBeam(-OFFSET, L/2, L); addBeam(-L/2, L, L, Math.PI/2); addBeam(-L/2, L+OFFSET, L, Math.PI/2); }
            else if (type.startsWith('double_point_L')) { addBeam(0, L/2, L); addBeam(OFFSET, L/2, L); addBeam(OFFSET/2, L/2, L*0.6, 0.4); }
            else if (type.startsWith('double_point_R')) { addBeam(0, L/2, L); addBeam(-OFFSET, L/2, L); addBeam(-OFFSET/2, L/2, L*0.6, -0.4); }

            return group;
        }

        window.saveToBrowser = () => { localStorage.setItem('railSimLayout', JSON.stringify(rails.map(r => ({ t: r.userData.type, x: r.position.x, y: r.position.y, z: r.position.z, ry: r.rotation.y })))); showMessage("💾 保存完了"); };
        window.loadFromBrowser = () => {
            const s = localStorage.getItem('railSimLayout'); if (!s) return showMessage("データがありません");
            rails.forEach(r => scene.remove(r)); rails.length = 0; 
            JSON.parse(s).forEach(d => { const r = createRailObject(d.t); r.position.set(d.x, d.y, d.z); r.rotation.y = d.ry; scene.add(r); rails.push(r); }); 
            updatePiers(); showMessage("📂 読込完了"); 
        };
        
        window.exportJSON = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(rails.map(r => ({ t: r.userData.type, x: r.position.x, y: r.position.y, z: r.position.z, ry: r.rotation.y })))], { type: 'application/json' }));
            a.download = 'layout.json'; a.click(); showMessage("📤 書出完了");
        };
        window.importJSON = (e) => {
            const f = e.target.files[0]; if (!f) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    rails.forEach(r => scene.remove(r)); rails.length = 0; 
                    JSON.parse(ev.target.result).forEach(d => { const r = createRailObject(d.t); r.position.set(d.x, d.y, d.z); r.rotation.y = d.ry; scene.add(r); rails.push(r); });
                    updatePiers(); showMessage("📥 読込完了");
                } catch(e) { showMessage("❌ 形式不正"); }
            };
            reader.readAsText(f);
        };

        function animate() { requestAnimationFrame(animate); orbit.update(); renderer.render(scene, camera); }
    </script>
